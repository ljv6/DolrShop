<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم | دولر بلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; }</style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-gray-700 pb-5">
            <h1 class="text-2xl font-black text-blue-500">لوحة التحكم الذكية</h1>
            <button onclick="saveAll()" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-bold transition">حفظ التغييرات النهائية</button>
        </div>

        <section class="bg-slate-800 p-6 rounded-2xl mb-8 shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">📦 إدارة المنتجات</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <input id="p-name" type="text" placeholder="اسم المنتج" class="bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 ring-blue-500">
                <input id="p-price" type="number" placeholder="السعر" class="bg-slate-700 p-3 rounded-lg outline-none">
                <input id="p-img" type="text" placeholder="رابط الصورة" class="bg-slate-700 p-3 rounded-lg outline-none">
                <button onclick="addProduct()" class="md:col-span-3 bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500">إضافة منتج جديد +</button>
            </div>
            <div id="admin-products-list" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                </div>
        </section>

        <section class="bg-slate-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-xl font-bold mb-4">🖼️ إدارة البانر (السلايدر)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <input id="b-title" type="text" placeholder="العنوان الرئيسي" class="bg-slate-700 p-3 rounded-lg outline-none">
                <input id="b-img" type="text" placeholder="رابط صورة الخلفية" class="bg-slate-700 p-3 rounded-lg outline-none">
                <button onclick="addBanner()" class="md:col-span-2 bg-purple-600 py-3 rounded-lg font-bold">إضافة بانر +</button>
            </div>
            <div id="admin-banners-list" class="space-y-2"></div>
        </section>

        <button onclick="clearSystem()" class="mt-10 text-red-400 text-sm underline opacity-50 hover:opacity-100">إعادة ضبط المصنع (حذف كل التعديلات)</button>
    </div>

    <script>
        // مصفوفات البيانات المؤقتة
        let localProducts = JSON.parse(localStorage.getItem('admin_products')) || [];
        let localBanners = JSON.parse(localStorage.getItem('admin_banners')) || [];

        function renderAdminItems() {
            // رندر المنتجات
            const pList = document.getElementById('admin-products-list');
            pList.innerHTML = localProducts.map((p, i) => `
                <div class="flex justify-between bg-slate-700 p-3 rounded-lg items-center">
                    <div class="flex items-center gap-3">
                        <img src="${p.img}" class="w-10 h-10 rounded object-cover">
                        <span>${p.name} - <b class="text-blue-400">${p.price} SAR</b></span>
                    </div>
                    <button onclick="deleteProduct(${i})" class="text-red-400 font-bold px-3">حذف</button>
                </div>
            `).join('');

            // رندر البانرات
            const bList = document.getElementById('admin-banners-list');
            bList.innerHTML = localBanners.map((b, i) => `
                <div class="flex justify-between bg-slate-700 p-3 rounded-lg items-center">
                    <span>${b.title}</span>
                    <button onclick="deleteBanner(${i})" class="text-red-400 font-bold px-3">حذف</button>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(name && price && img) {
                localProducts.unshift({name, price, img});
                renderAdminItems();
                clearInputs(['p-name', 'p-price', 'p-img']);
            }
        }

        function addBanner() {
            const title = document.getElementById('b-title').value;
            const image = document.getElementById('b-img').value;
            if(title && image) {
                localBanners.unshift({title, image, subtitle: 'عرض خاص', logo: ''});
                renderAdminItems();
                clearInputs(['b-title', 'b-img']);
            }
        }

        function deleteProduct(i) { localProducts.splice(i, 1); renderAdminItems(); }
        function deleteBanner(i) { localBanners.splice(i, 1); renderAdminItems(); }
        function clearInputs(ids) { ids.forEach(id => document.getElementById(id).value = ''); }

        function saveAll() {
            localStorage.setItem('admin_products', JSON.stringify(localProducts));
            localStorage.setItem('admin_banners', JSON.stringify(localBanners));
            alert('✅ تم حفظ البيانات بنجاح! قم بتحديث الصفحة الرئيسية للمتجر الآن.');
        }

        function clearSystem() {
            if(confirm('هل أنت متأكد من حذف جميع تعديلاتك والعودة للملفات الأصلية؟')) {
                localStorage.clear();
                location.reload();
            }
        }

        renderAdminItems();
    </script>
</body>
</html>
