<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية | دولر بلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; scroll-behavior: smooth; }
        .stat-card { background: linear-gradient(145deg, #1e293b, #111827); border: 1px solid #334155; }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-700 pb-6">
            <div>
                <h1 class="text-3xl font-black text-blue-500">لوحة الإدارة</h1>
                <p class="text-gray-400 text-sm mt-1">إحصائيات ومبيعات متجر دولر بلس</p>
            </div>
            <div class="flex gap-3">
                <button onclick="saveAll()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">حفظ التغييرات</button>
                <button onclick="location.href='index.html'" class="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-bold transition-all">معاينة المتجر</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">إجمالي المبيعات</p>
                <h3 id="stat-total-money" class="text-3xl font-black text-green-400 mt-2">0 <span class="text-sm">SAR</span></h3>
            </div>
            <div class="stat-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">عدد الطلبات</p>
                <h3 id="stat-total-orders" class="text-3xl font-black text-blue-400 mt-2">0</h3>
            </div>
            <div class="stat-card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm">عدد المنتجات</p>
                <h3 id="stat-total-prods" class="text-3xl font-black text-purple-400 mt-2">0</h3>
            </div>
        </div>

        <section class="bg-slate-900 rounded-3xl overflow-hidden mb-10 border border-gray-800 shadow-2xl">
            <div class="p-6 border-b border-gray-800 bg-slate-900/50">
                <h2 class="text-xl font-bold flex items-center gap-2">🛒 طلبات العملاء الأخيرة</h2>
            </div>
            <div class="table-container overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead class="bg-slate-800/50 text-gray-400 text-sm">
                        <tr>
                            <th class="p-4">الجوال</th>
                            <th class="p-4">المنتج</th>
                            <th class="p-4 text-center">الكمية</th>
                            <th class="p-4">الإجمالي</th>
                            <th class="p-4">التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body" class="divide-y divide-gray-800">
                        </tbody>
                </table>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section class="bg-slate-800/50 p-6 rounded-3xl border border-gray-700">
                <h2 class="text-xl font-bold mb-6">📦 إضافة منتج جديد</h2>
                <div class="grid gap-4">
                    <input id="p-name" type="text" placeholder="اسم المنتج" class="bg-slate-900 p-4 rounded-xl border border-gray-700 outline-none focus:border-blue-500">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="p-price" type="number" placeholder="السعر" class="bg-slate-900 p-4 rounded-xl border border-gray-700 outline-none">
                        <input id="p-img" type="text" placeholder="رابط الصورة" class="bg-slate-900 p-4 rounded-xl border border-gray-700 outline-none">
                    </div>
                    <button onclick="addProduct()" class="bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 transition-all">إضافة للقائمة</button>
                </div>
                <div id="admin-products-list" class="mt-8 space-y-3 max-h-80 overflow-y-auto pr-2"></div>
            </section>

            <section class="bg-slate-800/50 p-6 rounded-3xl border border-gray-700">
                <h2 class="text-xl font-bold mb-6">🖼️ إدارة السلايدر</h2>
                <div class="grid gap-4">
                    <input id="b-title" type="text" placeholder="عنوان البانر" class="bg-slate-900 p-4 rounded-xl border border-gray-700 outline-none">
                    <input id="b-img" type="text" placeholder="رابط الخلفية" class="bg-slate-900 p-4 rounded-xl border border-gray-700 outline-none">
                    <button onclick="addBanner()" class="bg-purple-600 py-4 rounded-xl font-bold hover:bg-purple-500 transition-all">إضافة بانر</button>
                </div>
                <div id="admin-banners-list" class="mt-8 space-y-3 max-h-80 overflow-y-auto pr-2"></div>
            </section>
        </div>

        <div class="mt-12 text-center">
            <button onclick="clearSystem()" class="text-red-500 text-sm hover:underline">مسح جميع البيانات وإعادة ضبط المتجر</button>
        </div>
    </div>

    <script>
        // جلب البيانات من التخزين
        let localProducts = JSON.parse(localStorage.getItem('admin_products')) || [];
        let localBanners = JSON.parse(localStorage.getItem('admin_banners')) || [];
        // بيانات تجريبية للطلبات (في الواقع سيتم تخزينها عند ضغط العميل على "إتمام الشراء")
        let localOrders = JSON.parse(localStorage.getItem('admin_orders')) || [
            {phone: '9665000000', product: 'منتج تجريبي', qty: 1, total: 150, date: '2024-03-10'},
        ];

        function renderAll() {
            // تحديث الإحصائيات
            document.getElementById('stat-total-prods').innerText = localProducts.length;
            document.getElementById('stat-total-orders').innerText = localOrders.length;
            const totalMoney = localOrders.reduce((sum, order) => sum + Number(order.total), 0);
            document.getElementById('stat-total-money').innerText = totalMoney + " SAR";

            // رندر الطلبات
            const oTable = document.getElementById('orders-table-body');
            oTable.innerHTML = localOrders.map(o => `
                <tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="p-4 font-bold text-blue-400">${o.phone}</td>
                    <td class="p-4">${o.product}</td>
                    <td class="p-4 text-center"><span class="bg-slate-700 px-3 py-1 rounded-lg">${o.qty}</span></td>
                    <td class="p-4 text-green-400 font-bold">${o.total} SAR</td>
                    <td class="p-4 text-gray-500 text-xs">${o.date}</td>
                </tr>
            `).join('');

            // رندر المنتجات
            const pList = document.getElementById('admin-products-list');
            pList.innerHTML = localProducts.map((p, i) => `
                <div class="flex justify-between bg-slate-900/80 p-4 rounded-2xl items-center border border-gray-800">
                    <div class="flex items-center gap-4">
                        <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover">
                        <div><p class="font-bold text-sm">${p.name}</p><p class="text-blue-500 text-xs">${p.price} SAR</p></div>
                    </div>
                    <button onclick="deleteItem('prod', ${i})" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg">حذف</button>
                </div>
            `).join('');

            // رندر البانرات
            const bList = document.getElementById('admin-banners-list');
            bList.innerHTML = localBanners.map((b, i) => `
                <div class="flex justify-between bg-slate-900/80 p-4 rounded-2xl items-center border border-gray-800">
                    <div class="flex items-center gap-4">
                        <img src="${b.image}" class="w-16 h-10 rounded-lg object-cover">
                        <p class="font-bold text-sm">${b.title}</p>
                    </div>
                    <button onclick="deleteItem('banner', ${i})" class="text-red-500 p-2 rounded-lg">حذف</button>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(name && price) {
                localProducts.unshift({name, price, img: img || 'placeholder.jpg'});
                renderAll();
                document.getElementById('p-name').value = ''; document.getElementById('p-price').value = '';
            }
        }

        function addBanner() {
            const title = document.getElementById('b-title').value;
            const image = document.getElementById('b-img').value;
            if(title && image) {
                localBanners.unshift({title, image, subtitle: 'متوفر الآن', logo: ''});
                renderAll();
                document.getElementById('b-title').value = ''; document.getElementById('b-img').value = '';
            }
        }

        function deleteItem(type, i) {
            if(type === 'prod') localProducts.splice(i, 1);
            else localBanners.splice(i, 1);
            renderAll();
        }

        function saveAll() {
            localStorage.setItem('admin_products', JSON.stringify(localProducts));
            localStorage.setItem('admin_banners', JSON.stringify(localBanners));
            localStorage.setItem('admin_orders', JSON.stringify(localOrders));
            alert('✅ تم حفظ جميع البيانات وتحديث المتجر');
        }

        function clearSystem() {
            if(confirm('سيتم حذف كل شيء، هل أنت متأكد؟')) {
                localStorage.clear();
                location.reload();
            }
        }

        renderAll();
    </script>
</body>
</html>
