<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة دولر بلس | Professional Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0b0f1a; color: white; }
        .card { background: #161c2d; border: 1px solid #2d3748; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card p-6 border-r-4 border-r-green-500">
                <p class="text-gray-400 text-sm">إجمالي الدخل</p>
                <h2 id="total-sales" class="text-3xl font-black text-white">0 SAR</h2>
            </div>
            <div class="card p-6 border-r-4 border-r-blue-500">
                <p class="text-gray-400 text-sm">إجمالي الطلبات</p>
                <h2 id="total-orders" class="text-3xl font-black text-white">0</h2>
            </div>
            <div class="card p-6 border-r-4 border-r-purple-500">
                <p class="text-gray-400 text-sm">منتجات الأدمن</p>
                <h2 id="admin-prod-count" class="text-3xl font-black text-white">0</h2>
            </div>
        </div>

        <div class="card overflow-hidden mb-10">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <h3 class="font-bold text-xl">📦 سجل طلبات العملاء</h3>
                <button onclick="clearOrders()" class="text-red-400 text-xs hover:underline">مسح السجل</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-sm">
                    <thead class="bg-gray-800 text-gray-400">
                        <tr>
                            <th class="p-4">الجوال</th>
                            <th class="p-4">المنتج</th>
                            <th class="p-4">السعر</th>
                            <th class="p-4">التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list"></tbody>
                </table>
            </div>
        </div>

        <div class="card p-8">
            <h3 class="font-bold text-xl mb-6">➕ إضافة منتج جديد للمتجر</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="p-name" type="text" placeholder="اسم المنتج" class="bg-gray-900 p-3 rounded-lg border border-gray-700 outline-none">
                <input id="p-price" type="number" placeholder="السعر (SAR)" class="bg-gray-900 p-3 rounded-lg border border-gray-700 outline-none">
                <input id="p-img" type="text" placeholder="رابط صورة المنتج" class="bg-gray-900 p-3 rounded-lg border border-gray-700 outline-none">
                <button onclick="saveProduct()" class="md:col-span-3 bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition">حفظ ونشر المنتج</button>
            </div>
        </div>
    </div>

    <script>
        function loadAdmin() {
            const products = JSON.parse(localStorage.getItem('admin_products')) || [];
            const orders = JSON.parse(localStorage.getItem('admin_orders')) || [];
            
            // تحديث الأرقام
            document.getElementById('admin-prod-count').innerText = products.length;
            document.getElementById('total-orders').innerText = orders.length;
            
            let total = 0;
            const ordersBody = document.getElementById('orders-list');
            ordersBody.innerHTML = orders.map(o => {
                total += Number(o.total);
                return `<tr class="border-b border-gray-800">
                    <td class="p-4 text-blue-400 font-bold">${o.phone}</td>
                    <td class="p-4">${o.product}</td>
                    <td class="p-4 font-bold">${o.total} SAR</td>
                    <td class="p-4 text-gray-500 text-xs">${o.date}</td>
                </tr>`;
            }).join('');
            
            document.getElementById('total-sales').innerText = total + " SAR";
        }

        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;

            if(name && price) {
                let products = JSON.parse(localStorage.getItem('admin_products')) || [];
                products.unshift({name, price, img: img || 'https://via.placeholder.com/150'});
                localStorage.setItem('admin_products', JSON.stringify(products));
                alert("تمت الإضافة! ستظهر بجانب المنتجات القديمة.");
                location.reload();
            }
        }

        function clearOrders() {
            if(confirm("هل تريد مسح سجل الطلبات؟")) {
                localStorage.removeItem('admin_orders');
                location.reload();
            }
        }

        loadAdmin();
    </script>
</body>
</html>
