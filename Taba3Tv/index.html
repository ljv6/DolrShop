<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taba3Tv</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#ffd700;
  --bg:#0f0f0f;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Splash */
#splashScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  z-index:9999;
}

.splash-content{
  text-align:center;
}

.splash-text{
  margin-top:15px;
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid #ffd700;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* UI */
header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:#11141d;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:10;
}

.controls{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
}

.controls button{
  background:#1a1e2e;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}

.search{
  padding:10px 15px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#11141d;
  color:#fff;
}

.section-title{
  margin:10px 15px;
  padding-right:10px;
  border-right:3px solid var(--primary);
  font-weight:bold;
}

.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#11141d;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-title{
  text-align:center;
  padding:6px;
  font-size:13px;
}

.player{
  width:100%;
  height:220px;
  background:black;
  position:sticky;
  top:60px;
}
</style>
</head>

<body>

<!-- 🔥 Splash Screen -->
<div id="splashScreen">
  <div class="splash-content">
    <div class="loader"></div>
    <div class="splash-text">Taba3 TV</div>
  </div>
</div>

<header>
  <div>Taba3Tv</div>
  <button onclick="loadData()">🔄</button>
</header>

<div class="controls">
  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
  </div>
</div>

<div class="search">
  <input id="search" placeholder="ابحث..." oninput="render()">
</div>

<div id="playerContainer" class="player"></div>
<div id="content"></div>

<script>
/* 🔊 نغمة */
function playSound(){
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.volume = 0.4;
  audio.play().catch(()=>{});
}

/* Splash hide */
window.addEventListener("load",()=>{
  playSound();

  setTimeout(()=>{
    const splash=document.getElementById("splashScreen");
    splash.style.opacity="0";
    splash.style.transition="0.5s";
    setTimeout(()=>splash.remove(),500);
  },2000);
});

/* API */
const API="https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json";

let data=null;

/* Load */
async function loadData(){
  const res=await fetch(API+"?t="+Date.now());
  data=await res.json();
  render();
}

/* Play */
function playVideo(url, name="", ep=""){
  document.getElementById("playerContainer").innerHTML=`
    <video controls autoplay width="100%" height="220">
      <source src="${url}">
    </video>
  `;
}

/* Open */
function openItem(item){
  let html=`<div style="padding:15px;font-size:18px;font-weight:bold">${item.name_ar}</div>`;

  if(item.episodes){
    item.episodes.forEach(ep=>{
      html+=`
      <div style="margin:8px 15px;padding:12px;background:#11141d;border-radius:8px;cursor:pointer"
      onclick="playVideo('${ep.url}','${item.name_ar}','${ep.title}')">
      ▶ ${ep.title}
      </div>`;
    });
  }

  document.getElementById("content").innerHTML=html;
}

/* Render */
function render(){
  if(!data)return;

  const search=document.getElementById("search").value.toLowerCase();
  let html="";

  data.sections.forEach(section=>{
    html+=`<div class="section-title">${section.title_ar}</div>
    <div class="row">`;

    section.channels
    .filter(i=>i.name_ar.includes(search))
    .forEach(item=>{
      html+=`
      <div class="card" onclick='openItem(${JSON.stringify(item).replace(/"/g,"&quot;")})'>
        <img src="${item.image}">
        <div class="card-title">${item.name_ar}</div>
      </div>`;
    });

    html+="</div>";
  });

  document.getElementById("content").innerHTML=html;
}

/* Theme */
function setTheme(t){
  document.body.style.background = t==="light" ? "#f5f5f5" : "#0f0f0f";
}

/* Init */
loadData();
setInterval(loadData,30000);
</script>

</body>
</html>
