<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taba3Tv</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #07090f;
  --bg-card: #11141d;
  --accent-gold: #cfa864;
  --text-primary: #ffffff;
  --glass: rgba(255,255,255,0.05);
}

.light{
  --bg-dark:#f5f5f5;
  --bg-card:#ffffff;
  --text-primary:#000;
  --glass:rgba(0,0,0,0.05);
}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:var(--bg-dark);
  color:var(--text-primary);
  padding-top:60px;
}

/* Header (Dolr style) */
header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:var(--bg-card);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  z-index:10;
}

header div{
  color:var(--accent-gold);
  font-weight:bold;
}

/* Controls */
.controls{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
}

.controls button{
  background:#1a1e2e;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}

.controls button.active{
  background:var(--accent-gold);
  color:black;
}

/* Search */
.search{
  padding:10px 15px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--bg-card);
  color:var(--text-primary);
}

/* Sections */
.section-title{
  margin:10px 15px;
  padding-right:10px;
  border-right:3px solid var(--accent-gold);
  font-weight:bold;
}

/* Grid like Dolr */
.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

/* Cards */
.card{
  background:var(--bg-card);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-title{
  text-align:center;
  padding:6px;
  font-size:13px;
}

/* Player */
.player{
  width:100%;
  height:220px;
  background:black;
  position:sticky;
  top:60px;
}

/* Episode */
.episode{
  margin:8px 15px;
  padding:12px;
  background:var(--bg-card);
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>Taba3Tv</div>
  <button onclick="loadData()">🔄</button>
</header>

<div class="controls">
  <div>
    <button onclick="setTheme('dark')" id="darkBtn">Dark</button>
    <button onclick="setTheme('light')" id="lightBtn">Light</button>
  </div>

  <div>
    <button onclick="setColor('#ffd700')">Gold</button>
    <button onclick="setColor('#007bff')">Blue</button>
    <button onclick="setColor('#ff3b30')">Red</button>
  </div>
</div>

<div class="search">
  <input id="search" placeholder="ابحث..." oninput="render()">
</div>

<div id="playerContainer" class="player"></div>
<div id="content"></div>

<script>
const API="https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json";

let data=null;
let focusIndex=0;

/* Theme */
function setTheme(t){
  document.body.classList.toggle("light",t==="light");
  localStorage.setItem("theme",t);
  updateUI();
}

function setColor(c){
  document.documentElement.style.setProperty("--accent-gold",c);
  localStorage.setItem("color",c);
}

function updateUI(){
  const t=localStorage.getItem("theme")||"dark";
  document.getElementById("darkBtn").classList.toggle("active",t==="dark");
  document.getElementById("lightBtn").classList.toggle("active",t==="light");
}

/* Load */
async function loadData(){
  try{
    const res=await fetch(API+"?t="+Date.now(),{cache:"no-store"});
    data=await res.json();
    render();
  }catch(e){console.error(e);}
}

/* Player */
function playVideo(url){
  document.getElementById("playerContainer").innerHTML=`
    <video controls autoplay width="100%" height="220">
      <source src="${url}">
    </video>
  `;
}

/* Open Item */
function openItem(item){
  let html=`<div style="padding:15px;font-weight:bold;font-size:18px">
    ${item.name_ar}
  </div>`;

  if(item.episodes && item.episodes.length){
    item.episodes.forEach(ep=>{
      html+=`<div class="episode" onclick="playVideo('${ep.url}')">
        ▶ ${ep.title}
      </div>`;
    });
  }else{
    html+=`<div style="padding:15px">
      <button onclick="playVideo('${item.stream_url}')"
      style="width:100%;padding:12px;background:var(--accent-gold);border:none;border-radius:10px;">
      تشغيل
      </button>
    </div>`;
  }

  document.getElementById("content").innerHTML=html;
}

/* Render */
function render(){
  if(!data)return;

  const search=document.getElementById("search").value.toLowerCase();
  let html="";

  data.sections.forEach(section=>{
    html+=`<div class="section-title">${section.title_ar}</div>
    <div class="row">`;

    section.channels
    .filter(i=>i.name_ar.includes(search))
    .forEach(item=>{
      html+=`
      <div class="card" onclick='openItem(${JSON.stringify(item).replace(/"/g,"&quot;")})'>
        <img src="${item.image}">
        <div class="card-title">${item.name_ar}</div>
      </div>`;
    });

    html+="</div>";
  });

  document.getElementById("content").innerHTML=html;
}

/* Init */
setTheme(localStorage.getItem("theme")||"dark");
setColor(localStorage.getItem("color")||"#cfa864");
updateUI();
loadData();

/* Auto refresh */
setInterval(loadData,30000);
</script>

</body>
</html>
