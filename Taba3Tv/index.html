<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TABA3 TV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
:root{
  --primary:#ffd700;
  --bg:#0f0f0f;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --glass:rgba(255,255,255,0.08);
}

.light{
  --bg:#f5f5f5;
  --card:#fff;
  --text:#000;
  --glass:rgba(0,0,0,0.05);
}

body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Splash */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:var(--bg);
  z-index:999;
}

/* Header */
header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Controls */
.controls{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
}

.controls button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--glass);
  color:var(--text);
}

.controls button.active{
  background:var(--primary);
  color:#000;
}

/* Player */
.player{
  width:100%;
  height:220px;
  background:black;
  position:sticky;
  top:0;
  z-index:10;
}

/* Search */
.search{
  padding:10px 15px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:var(--text);
}

/* Sections */
.section-title{
  padding:10px 15px;
  font-weight:bold;
}

/* Row */
.row{
  display:flex;
  overflow-x:auto;
  padding:0 10px;
}

/* Card */
.card{
  min-width:150px;
  margin:10px;
  padding:10px;
  background:var(--glass);
  border-radius:16px;
  backdrop-filter:blur(10px);
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.card-title{
  margin-top:6px;
  font-size:13px;
}

/* Episode */
.episode{
  margin:8px 15px;
  padding:12px;
  background:var(--glass);
  border-radius:10px;
  cursor:pointer;
}

.active{
  border-left:4px solid var(--primary);
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
  <h2>تابع</h2>
</div>

<header>
  <div>تابع</div>
  <button onclick="loadData()">🔄</button>
</header>

<div class="controls">
  <div>
    <button onclick="setTheme('dark')" id="darkBtn">Dark</button>
    <button onclick="setTheme('light')" id="lightBtn">Light</button>
  </div>

  <div>
    <button onclick="setColor('#ffd700')">Gold</button>
    <button onclick="setColor('#007bff')">Blue</button>
    <button onclick="setColor('#ff3b30')">Red</button>
    <button onclick="setColor('#a020f0')">Purple</button>
  </div>
</div>

<div class="search">
  <input id="search" placeholder="ابحث..." oninput="render()">
</div>

<div id="playerContainer" class="player"></div>
<div id="content"></div>

<script>
const API="https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json";

let data=null;
let cards=[];
let focusIndex=0;

/* Theme */
function setTheme(t){
  document.body.classList.toggle("light",t==="light");
  localStorage.setItem("theme",t);
  updateUI();
}

function setColor(c){
  document.documentElement.style.setProperty("--primary",c);
  localStorage.setItem("color",c);
}

function updateUI(){
  const t=localStorage.getItem("theme")||"dark";
  document.getElementById("darkBtn").classList.toggle("active",t==="dark");
  document.getElementById("lightBtn").classList.toggle("active",t==="light");
}

/* Load JSON with no cache */
async function loadData(){
  const url = API + "?t=" + new Date().getTime();
  const res = await fetch(url,{cache:"no-store"});
  data=await res.json();
  render();
}

/* Player */
function playVideo(url){
  document.getElementById("playerContainer").innerHTML=`
    <video controls autoplay width="100%" height="220">
      <source src="${url}" type="video/mp4">
    </video>
  `;
}

/* Render */
function render(){
  if(!data)return;

  const search=document.getElementById("search").value.toLowerCase();
  let html="";

  data.sections.forEach(section=>{
    html+=`<div class="section-title">${section.title_ar}</div>
    <div class="row">`;

    section.channels
    .filter(i=>i.name_ar.includes(search))
    .forEach(item=>{
      html+=`
      <div class="card">
        <img src="${item.image}">
        <div class="card-title">${item.name_ar}</div>
      </div>`;
    });

    html+="</div>";
  });

  document.getElementById("content").innerHTML=html;
  initRemote();
}

/* Remote control */
function initRemote(){
  cards=document.querySelectorAll(".card");
  focusIndex=0;
  highlight();
}

function highlight(){
  cards.forEach(c=>c.style.outline="none");
  if(cards[focusIndex]){
    cards[focusIndex].style.outline="3px solid var(--primary)";
    cards[focusIndex].scrollIntoView({behavior:"smooth",block:"center"});
  }
}

document.addEventListener("keydown",(e)=>{
  if(cards.length===0) return;

  if(e.key==="ArrowRight"||e.key==="ArrowDown"){
    focusIndex=(focusIndex+1)%cards.length;
    highlight();
  }

  if(e.key==="ArrowLeft"||e.key==="ArrowUp"){
    focusIndex=(focusIndex-1+cards.length)%cards.length;
    highlight();
  }

  if(e.key==="Enter"){
    cards[focusIndex].click();
  }
});

/* Init */
setTheme(localStorage.getItem("theme")||"dark");
setColor(localStorage.getItem("color")||"#ffd700");
updateUI();
loadData();

/* Auto refresh JSON */
setInterval(loadData,30000);

/* Splash */
setTimeout(()=>document.getElementById("splash").style.display="none",1500);

/* PWA Service Worker */
if("serviceWorker" in navigator){
  const swCode=`
  self.addEventListener('install',e=>{
    e.waitUntil(caches.open('app').then(c=>c.add('/')));
  });
  self.addEventListener('fetch',e=>{
    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
  });
  `;
  const blob=new Blob([swCode],{type:"text/javascript"});
  const swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL);
}
</script>

</body>
</html>
