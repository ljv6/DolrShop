<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taba3Tv</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-dark:#07090f;
  --bg-card:#11141d;
  --accent:#cfa864;
  --text:#fff;
}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:var(--bg-dark);
  color:var(--text);
  padding-top:60px;
}

/* Splash */
#splashScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index:9999;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:var(--bg-card);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

/* Layout */
.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:var(--bg-card);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-title{
  text-align:center;
  padding:6px;
}

/* Player */
.player{
  width:100%;
  height:220px;
  background:black;
  position:sticky;
  top:60px;
}

/* Episode */
.episode-btn{
  margin:8px 15px;
  padding:12px;
  background:var(--bg-card);
  border-radius:8px;
  cursor:pointer;
}

.section-title{
  margin:10px 15px;
  border-right:3px solid var(--accent);
  padding-right:10px;
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splashScreen">
  <div>
    <div class="loader"></div>
    <div style="margin-top:15px;text-align:center;color:var(--accent)">Taba3Tv</div>
  </div>
</div>

<header>
  <div>Taba3Tv</div>
</header>

<div id="playerContainer" class="player"></div>
<div id="content"></div>

<script>
/* 🔴 ضع بيانات البوت هنا */
const BOT_TOKEN = "8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
const CHAT_ID = "591768998";

/* Telegram */
function sendTelegram(text){
  if(!BOT_TOKEN || BOT_TOKEN.includes("PUT_")) return;

  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:CHAT_ID,text})
  });
}

/* Device info */
function getDeviceInfo(){
  const ua=navigator.userAgent;

  let type="كمبيوتر";
  if(/iPhone/i.test(ua)) type="iPhone";
  else if(/Android/i.test(ua)) type="Android";

  let browser="Unknown";
  if(ua.includes("Chrome")) browser="Chrome";
  else if(ua.includes("Safari")) browser="Safari";

  let os="Unknown";
  if(ua.includes("Linux")) os="Linux";
  if(ua.includes("Windows")) os="Windows";
  if(ua.includes("iPhone")) os="iOS";

  return {type,browser,os};
}

/* Generate ID */
function genId(){
  return Math.random().toString(36).substring(2,10);
}

/* Send Event */
function sendEvent(status,meta={}){
  const d=getDeviceInfo();
  const time=new Date().toLocaleString('ar-SA');

  const msg=`
${status}

🆔 ID: ${genId()}
⏰ ${time}

📱 الجهاز: ${d.type}
📌 النوع المتوقع: ${d.type}
🧠 النظام: ${d.os}
🌐 المتصفح: ${d.browser}
💻 المنصة: ${navigator.platform}
📺 الشاشة: ${screen.width}x${screen.height}
🌍 اللغة: ${navigator.language}

🧾 UA:
${navigator.userAgent}

🎬 ${meta.name||""}
⏱️ ${meta.duration||""}

Taba3Tv
`;

  sendTelegram(msg);
}

/* دخول الموقع */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("splashScreen").style.display="none";
  },2000);

  sendEvent("👀 دخول موقع");
});

/* API */
const API="https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json";
let data=null;

async function loadData(){
  const res=await fetch(API+"?t="+Date.now());
  data=await res.json();
  render();
}

/* Play */
function playVideo(url,name,ep){
  const video=document.getElementById("playerContainer");

  video.innerHTML=`
    <video id="videoPlayer" controls autoplay width="100%" height="220">
      <source src="${url}">
    </video>
  `;

  const v=document.getElementById("videoPlayer");

  sendEvent("📺 تشغيل",{
    name:`${name} - ${ep}`
  });

  v.addEventListener("pause",()=>{
    sendEvent("⏸️ إيقاف",{
      name:`${name} - ${ep}`,
      duration:Math.floor(v.currentTime)+" ثانية"
    });
  });
}

/* Open Item */
function openItem(item){
  let html=`<div style="padding:15px">${item.name_ar}</div>`;

  if(item.episodes){
    item.episodes.forEach(ep=>{
      html+=`
      <div class="episode-btn"
      onclick="playVideo('${ep.url}','${item.name_ar}','${ep.title}')">
      ${ep.title}
      </div>`;
    });
  }

  document.getElementById("content").innerHTML=html;
}

/* Render */
function render(){
  if(!data)return;

  let html="";

  data.sections.forEach(section=>{
    html+=`<div class="section-title">${section.title_ar}</div>
    <div class="row">`;

    section.channels.forEach(item=>{
      html+=`
      <div class="card" onclick='openItem(${JSON.stringify(item).replace(/"/g,"&quot;")})'>
        <img src="${item.image}">
        <div class="card-title">${item.name_ar}</div>
      </div>`;
    });

    html+="</div>";
  });

  document.getElementById("content").innerHTML=html;
}

loadData();
</script>

</body>
</html>
