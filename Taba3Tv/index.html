<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taba3Tv</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
:root{
  --primary:#ffd700;
  --bg:#0f0f0f;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --glass:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.controls{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
}

.controls button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--glass);
  color:var(--text);
}

.player{
  width:100%;
  height:220px;
  background:black;
  position:sticky;
  top:0;
}

.search{
  padding:10px 15px;
}

.search input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:var(--text);
}

.section-title{
  padding:10px 15px;
  font-weight:bold;
}

.row{
  display:flex;
  overflow-x:auto;
  padding:0 10px;
}

.card{
  min-width:150px;
  margin:10px;
  padding:10px;
  background:var(--glass);
  border-radius:16px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
}

.card-title{
  margin-top:6px;
  font-size:13px;
}

.episode{
  margin:8px 15px;
  padding:12px;
  background:var(--glass);
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>Taba3Tv</div>
  <button onclick="loadData()">🔄</button>
</header>

<div class="controls">
  <div>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('light')">Light</button>
  </div>
  <div>
    <button onclick="setColor('#ffd700')">Gold</button>
    <button onclick="setColor('#007bff')">Blue</button>
  </div>
</div>

<div class="search">
  <input id="search" placeholder="ابحث..." oninput="render()">
</div>

<div id="playerContainer" class="player"></div>
<div id="content"></div>

<script>

/* ================= TELEGRAM ================= */
const BOT_TOKEN="8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
const CHAT_ID="591768998";

function sendTelegram(text){
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:CHAT_ID,text})
  }).catch(()=>{});
}

/* ================= DEVICE ================= */
function getDeviceId(){
  let id=localStorage.getItem("taba3_id");
  if(!id){
    id=Math.random().toString(36).substring(2,10);
    localStorage.setItem("taba3_id",id);
  }
  return id;
}

function getDevice(){
  const ua=navigator.userAgent;
  let type="كمبيوتر";

  if(/iPhone/i.test(ua)) type="iPhone";
  else if(/Android/i.test(ua)) type="Android";
  else if(/iPad/i.test(ua)) type="iPad";

  let browser="Unknown";
  if(/Chrome/i.test(ua)) browser="Chrome";
  else if(/Safari/i.test(ua)) browser="Safari";

  return {
    type,
    screen:screen.width+"x"+screen.height,
    lang:navigator.language,
    platform:navigator.platform,
    ua,
    browser
  };
}

/* ================= SEND EVENT ================= */
function sendEvent(title, extra=""){
  const d=getDevice();
  const id=getDeviceId();
  const time=new Date().toLocaleString('ar-SA');

  sendTelegram(`
${title}

🆔 ID: ${id}
⏰ ${time}

📱 الجهاز: ${d.type}
🌐 المتصفح: ${d.browser}
💻 النظام: ${d.platform}
📺 الشاشة: ${d.screen}
🌍 اللغة: ${d.lang}

🧾 UA:
${d.ua}

${extra}

Taba3Tv
`);
}

/* ================= LOAD ================= */
const API="https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json";
let data=null;

async function loadData(){
  const res=await fetch(API+"?t="+Date.now());
  data=await res.json();
  render();
}

/* ================= PLAYER ================= */
function playVideo(url){
  document.getElementById("playerContainer").innerHTML=`
    <video id="video" controls autoplay width="100%" height="220">
      <source src="${url}">
    </video>
  `;

  const video=document.getElementById("video");

  video.addEventListener("pause",()=>{
    sendEvent("⏸️ إيقاف");
  });

  video.addEventListener("play",()=>{
    sendEvent("▶️ تشغيل / استئناف");
  });
}

/* ================= OPEN ITEM ================= */
function openItem(item){

  sendEvent("📺 فتح عنصر", `🎬 ${item.name_ar}`);

  let html=`<div style="padding:15px;font-size:20px;font-weight:bold">${item.name_ar}</div>`;

  if(item.episodes){
    item.episodes.forEach(ep=>{
      html+=`<div class="episode" onclick="playVideo('${ep.url}')">▶ ${ep.title}</div>`;
    });
  }else{
    html+=`<div style="padding:15px">
      <button onclick="playVideo('${item.stream_url}')"
      style="padding:12px;width:100%;background:var(--primary);border:none;border-radius:10px;">
      تشغيل
      </button>
    </div>`;
  }

  document.getElementById("content").innerHTML=html;
}

/* ================= RENDER ================= */
function render(){
  if(!data)return;

  const search=document.getElementById("search").value.toLowerCase();
  let html="";

  data.sections.forEach(section=>{
    html+=`<div class="section-title">${section.title_ar}</div><div class="row">`;

    section.channels
    .filter(i=>i.name_ar.includes(search))
    .forEach(item=>{
      html+=`
      <div class="card" onclick='openItem(${JSON.stringify(item).replace(/"/g,"&quot;")})'>
        <img src="${item.image}">
        <div class="card-title">${item.name_ar}</div>
      </div>`;
    });

    html+="</div>";
  });

  document.getElementById("content").innerHTML=html;
}

/* ================= INIT ================= */
window.onload=function(){
  loadData();
  sendEvent("👀 دخول الموقع");
};

</script>

</body>
</html>
