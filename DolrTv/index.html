<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolr Tv</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark: #07090f;
    --bg-card: #11141d;
    --accent-gold: #cfa864;
    --text-primary: #ffffff;
    --font-family: 'Tajawal', sans-serif;
}
body {
    font-family: var(--font-family);
    background: var(--bg-dark);
    color: white;
    margin: 0;
    padding-top: 60px;
}
.app-bar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: var(--bg-card);
    display: flex;
    align-items: center;
    padding: 10px;
}
.content-container { padding: 15px; }
.items-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.item-card {
    background: var(--bg-card);
    border-radius: 8px;
    cursor: pointer;
}
.poster-wrapper {
    padding-top: 140%;
    position: relative;
}
.item-poster {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.episode-btn {
    background: #1a1e2e;
    padding: 10px;
    margin: 5px;
    text-align: center;
    cursor: pointer;
}
video {
    width: 100%;
    margin-bottom: 10px;
}
.modal {
    display: none;
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
}
.modal-content {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: var(--bg-card);
    padding: 15px;
}
</style>
</head>

<body>

<div class="app-bar">Dolr Tv</div>
<div class="content-container" id="main-content"></div>

<div class="modal" id="episodeModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle"></h3>
        <video id="videoPlayer" controls style="display:none;"></video>
        <div id="episodesGrid"></div>
    </div>
</div>

<script>

// 🔥 بيانات البوت
const TOKEN = "8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
const CHAT_ID = "591768998";

let appData = null;
let currentEpisodes = [];
let currentEpisodeIndex = null;

// ✅ تحميل البيانات
async function loadData() {
    try {
        const res = await fetch('https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json?t=' + Date.now());
        appData = await res.json();
        renderContent();
    } catch (err) {
        console.error("خطأ تحميل البيانات:", err);
    }
}

// ✅ عرض المحتوى
function renderContent() {
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    appData.sections.forEach(section => {
        container.innerHTML += `
            <h2>${section.title_ar}</h2>
            <div class="items-grid">
                ${section.channels.map(item => `
                    <div class="item-card" onclick="openEpisodes('${item.name_ar}', ${item.id})">
                        <div class="poster-wrapper">
                            <img src="${item.image}" class="item-poster">
                        </div>
                        <div>${item.name_ar}</div>
                    </div>
                `).join('')}
            </div>
        `;
    });
}

// ✅ فتح الحلقات
function openEpisodes(name, id) {
    let selected = null;

    appData.sections.forEach(sec => {
        const found = sec.channels.find(c => c.id === id);
        if (found) selected = found;
    });

    if (!selected) return;

    document.getElementById('modalTitle').innerText = name;
    currentEpisodes = selected.episodes;

    document.getElementById('episodesGrid').innerHTML =
        currentEpisodes.map((ep, i) =>
            `<div class="episode-btn" onclick="playEpisode(${i})">${ep.title}</div>`
        ).join('');

    document.getElementById('episodeModal').style.display = 'block';
}

// ✅ معلومات الجهاز
function getDeviceInfo() {
    const ua = navigator.userAgent;
    return {
        type: /mobile/i.test(ua) ? "جوال" : "كمبيوتر",
        platform: navigator.platform,
        lang: navigator.language,
        screen: screen.width + "x" + screen.height,
        ua: ua
    };
}

// ✅ إرسال تيليجرام (مضبوط بدون تعليق الموقع)
function sendToTelegram(msg) {
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: msg
        })
    }).catch(() => {});
}

// ✅ تشغيل الحلقة (مستقر)
function playEpisode(index) {
    const ep = currentEpisodes[index];
    currentEpisodeIndex = index;

    const video = document.getElementById('videoPlayer');

    video.src = ep.url;
    video.style.display = 'block';

    // 🔥 حل مشكلة التشغيل
    video.load();
    video.play().catch(() => {});

    // 🔥 إرسال الإشعار بدون ما يخرب التشغيل
    setTimeout(() => {
        const device = getDeviceInfo();
        const time = new Date().toLocaleString('ar-SA');
        const series = document.getElementById('modalTitle').innerText;

        const message = `
📺 تشغيل جديد

🎬 ${series}
🎞️ ${ep.title}

⏰ ${time}

📱 ${device.type}
💻 ${device.platform}
📺 ${device.screen}
🌍 ${device.lang}

${device.ua}
`;

        sendToTelegram(message);
    }, 500);
}

// إغلاق
function closeModal(e) {
    if (e.target.id === 'episodeModal') {
        const video = document.getElementById('videoPlayer');
        video.pause();
        video.src = '';
        document.getElementById('episodeModal').style.display = 'none';
    }
}

window.onload = loadData;

</script>

</body>
</html>
