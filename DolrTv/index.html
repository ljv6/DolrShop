<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolr Tv</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark: #07090f;
    --bg-card: #11141d;
    --accent-gold: #cfa864;
    --text-primary: #ffffff;
    --font-family: 'Tajawal', sans-serif;
}
body {
    font-family: var(--font-family);
    background: var(--bg-dark);
    color: white;
    margin: 0;
}
.app-bar {
    position: fixed;
    top: 0;
    width: 100%;
    background: var(--bg-card);
    padding: 15px;
}
.content-container {
    padding: 70px 15px;
}
.items-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.item-card {
    background: var(--bg-card);
    border-radius: 8px;
    cursor: pointer;
}
.poster-wrapper {
    padding-top: 140%;
    position: relative;
}
.item-poster {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.episode-btn {
    background: #1a1e2e;
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
video {
    width: 100%;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="app-bar">Dolr Tv</div>
<div class="content-container" id="main-content"></div>

<div id="episodeModal" style="display:none; position:fixed; top:0; width:100%; height:100%; background:#000c;">
    <div style="background:#111; position:absolute; bottom:0; width:100%; padding:10px;">
        <h3 id="modalTitle"></h3>
        <video id="videoPlayer" controls style="display:none;"></video>
        <div id="episodesGrid"></div>
    </div>
</div>

<script>

// 🔥 بيانات البوت
const TELEGRAM_BOT_TOKEN = "8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
const TELEGRAM_CHAT_ID = "591768998";

let appData = null;
let currentEpisodes = [];
let currentEpisodeIndex = null;

// ✅ جلب معلومات الجهاز
function getDeviceInfo() {
    const ua = navigator.userAgent;

    let deviceType = "كمبيوتر";
    if (/mobile/i.test(ua)) deviceType = "جوال";
    if (/tablet/i.test(ua)) deviceType = "تابلت";

    return {
        deviceType,
        ua,
        platform: navigator.platform,
        lang: navigator.language,
        screen: screen.width + "x" + screen.height
    };
}

// ✅ إرسال تيليجرام
async function sendToTelegram(message) {
    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: message
        })
    });
}

// تحميل البيانات
async function loadData() {
    const res = await fetch('https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json?t=' + Date.now());
    appData = await res.json();
    renderContent();
}

function renderContent() {
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    appData.sections.forEach(section => {
        container.innerHTML += `
        <h2>${section.title_ar}</h2>
        <div class="items-grid">
        ${section.channels.map(item => `
            <div class="item-card" onclick="openEpisodes('${item.name_ar}', ${item.id})">
                <div class="poster-wrapper">
                    <img src="${item.image}" class="item-poster">
                </div>
                <div>${item.name_ar}</div>
            </div>
        `).join('')}
        </div>`;
    });
}

function openEpisodes(name, id) {
    let selected;

    appData.sections.forEach(sec => {
        const found = sec.channels.find(c => c.id === id);
        if (found) selected = found;
    });

    if (!selected) return;

    document.getElementById('modalTitle').innerText = name;
    currentEpisodes = selected.episodes;

    document.getElementById('episodesGrid').innerHTML =
        currentEpisodes.map((ep, i) =>
            `<div class="episode-btn" onclick="playEpisode(${i})">${ep.title}</div>`
        ).join('');

    document.getElementById('episodeModal').style.display = 'block';
}

// 🔥 تشغيل الحلقة + إرسال إشعار
function playEpisode(index) {
    const ep = currentEpisodes[index];
    currentEpisodeIndex = index;

    const video = document.getElementById('videoPlayer');
    video.src = ep.url;
    video.style.display = 'block';
    video.play();

    const device = getDeviceInfo();
    const now = new Date().toLocaleString('ar-SA');

    const series = document.getElementById('modalTitle').innerText;

    const message = `
🚀 تشغيل جديد

🎬 المسلسل: ${series}
🎞️ الحلقة: ${ep.title}

⏰ الوقت: ${now}

📱 الجهاز: ${device.deviceType}
🖥️ النظام: ${device.platform}
🌍 اللغة: ${device.lang}
📺 الشاشة: ${device.screen}

🧠 UA:
${device.ua}
`;

    sendToTelegram(message);
}

window.onload = loadData;

</script>

</body>
</html>
