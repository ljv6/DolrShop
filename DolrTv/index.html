<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dolr Tv - دولر بلس</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark:#07090f;
    --bg-card:#11141d;
    --accent-gold:#cfa864;
    --text-primary:#fff;
    --font-family:'Tajawal',sans-serif;
    --app-bar-height:60px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
    font-family:var(--font-family);
    background:var(--bg-dark);
    color:var(--text-primary);
    margin:0;
    padding-top:var(--app-bar-height);
    padding-bottom:70px;
}

.app-bar{
    position:fixed;top:0;width:100%;height:var(--app-bar-height);
    background:var(--bg-card);
    display:flex;align-items:center;padding:0 15px;
}

.app-title{color:var(--accent-gold);font-weight:bold;}

.content-container{padding:15px;}

.section-title{
    border-right:3px solid var(--accent-gold);
    padding-right:10px;
}

.items-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.item-card{
    background:var(--bg-card);
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
}

.poster-wrapper{position:relative;padding-top:145%;}

.item-poster{
    position:absolute;width:100%;height:100%;object-fit:cover;
}

.item-info{text-align:center;padding:5px;}

.modal{
    display:none;
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
}

.modal-content{
    position:absolute;
    bottom:0;
    width:100%;
    background:var(--bg-card);
    padding:15px;
    max-height:90%;
    overflow-y:auto;
}

.episodes-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.episode-btn{
    background:#1a1e2e;
    padding:10px;
    text-align:center;
    border-radius:6px;
    cursor:pointer;
}

video{
    width:100%;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="app-bar">
<div class="app-title">Dolr Tv</div>
</div>

<div class="content-container" id="main-content"></div>

<div class="modal" id="episodeModal" onclick="closeModal(event)">
<div class="modal-content" onclick="event.stopPropagation()">
<h3 id="modalTitle"></h3>

<video id="videoPlayer" controls style="display:none;margin-bottom:10px;"></video>
<div class="episodes-grid" id="episodesGrid"></div>

</div>
</div>

<script>

const BOT_TOKEN = "8372973119:AAEvtD7kL-5L1uA4URd_CROFb9V4z1nXt8E";
const CHAT_ID = "591768998";

function sendTelegram(text){
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({chat_id:CHAT_ID,text})
    }).catch(()=>{});
}

function getDevice(){
    const ua=navigator.userAgent;
    let type="كمبيوتر";

    if(/iPhone/i.test(ua)) type="iPhone";
    else if(/Android/i.test(ua)) type="Android";
    else if(/iPad/i.test(ua)) type="iPad";

    return {
        type,
        screen:screen.width+"x"+screen.height,
        lang:navigator.language
    };
}

function getDeviceId(){
    let id=localStorage.getItem("dev_id");
    if(!id){
        id=Math.random().toString(36).substring(2,10);
        localStorage.setItem("dev_id",id);
    }
    return id;
}

function sendEvent(title,extra=""){
    const d=getDevice();
    const id=getDeviceId();
    const time=new Date().toLocaleString('ar-SA');

    sendTelegram(`
${title}

🆔 ${id}
⏰ ${time}

📱 ${d.type}
📺 ${d.screen}
🌍 ${d.lang}

${extra}

Dolr Tv
`);
}

// load data
let appData=null;
let currentEpisodes=[];
let currentEpisodeIndex=null;

async function loadData(){
    const res=await fetch('https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json?t='+Date.now());
    appData=await res.json();
    renderContent();
}

function renderContent(){
    const c=document.getElementById('main-content');
    c.innerHTML="";

    appData.sections.forEach(section=>{
        c.innerHTML+=`
        <div>
        <h2 class="section-title">${section.title_ar}</h2>
        <div class="items-grid">
        ${section.channels.map(item=>`
            <div class="item-card" onclick="openEpisodes('${item.name_ar}',${item.id})">
                <div class="poster-wrapper">
                    <img src="${item.image}" class="item-poster">
                </div>
                <div class="item-info">${item.name_ar}</div>
            </div>
        `).join("")}
        </div>
        </div>`;
    });
}

const modal=document.getElementById('episodeModal');
const modalTitle=document.getElementById('modalTitle');

function openEpisodes(name,id){
    let selected=null;

    appData.sections.forEach(sec=>{
        const f=sec.channels.find(c=>c.id===id);
        if(f) selected=f;
    });

    modalTitle.innerText=name;
    currentEpisodes=selected.episodes;
    renderEpisodes();
    modal.style.display='block';
}

function renderEpisodes(){
    const g=document.getElementById('episodesGrid');
    g.innerHTML=currentEpisodes.map((ep,i)=>`
        <div class="episode-btn" onclick="playEpisode(${i})">${ep.title}</div>
    `).join("");
}

function playEpisode(i){
    const ep=currentEpisodes[i];
    currentEpisodeIndex=i;

    const video=document.getElementById('videoPlayer');
    video.src=ep.url;
    video.style.display='block';
    video.play();

    sendEvent("▶️ تشغيل", `🎬 ${modalTitle.innerText}\n🎞️ ${ep.title}`);
}

const video=document.getElementById('videoPlayer');

video.addEventListener('pause',()=>{
    sendEvent("⏸️ إيقاف", `🎬 ${modalTitle.innerText}\n⏱️ ${Math.floor(video.currentTime)} ثانية`);
});

video.addEventListener('play',()=>{
    sendEvent("▶️ استئناف", `🎬 ${modalTitle.innerText}\n⏱️ ${Math.floor(video.currentTime)} ثانية`);
});

function closeModal(e){
    if(e.target===modal){
        modal.style.display='none';
        video.pause();
        video.src="";
    }
}

// دخول الموقع
window.onload=function(){
    loadData();
    sendEvent("👀 دخول الموقع");
};

</script>

</body>
</html>
