<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dolr Tv - دولر بلس</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #07090f;
            --bg-card: #11141d;
            --accent-gold: #cfa864;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --font-family: 'Tajawal', sans-serif;
            --app-bar-height: 60px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding-top: var(--app-bar-height);
            padding-bottom: 70px;
        }

        .app-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--app-bar-height);
            background-color: var(--bg-card);
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .app-title {
            color: var(--accent-gold);
            font-weight: bold;
        }

        .content-container {
            padding: 15px;
        }

        .section-header {
            margin: 15px 0;
        }

        .section-title {
            border-right: 3px solid var(--accent-gold);
            padding-right: 10px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .item-card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }

        .poster-wrapper {
            position: relative;
            padding-top: 145%;
        }

        .item-poster {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info {
            text-align: center;
            padding: 5px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--bg-card);
            padding: 15px;
            max-height: 90%;
            overflow-y: auto;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .episode-btn {
            background: #1a1e2e;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
        }

        video {
            border-radius: 8px;
            background: black;
        }
    </style>
</head>

<body>

<div class="app-bar">
    <div class="app-title">Dolr Tv</div>
</div>

<div class="content-container" id="main-content"></div>

<!-- Modal -->
<div class="modal" id="episodeModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalTitle"></h3>

        <!-- Video Player -->
        <video id="videoPlayer" controls style="width:100%; display:none; margin-bottom:10px;"></video>

        <div class="episodes-grid" id="episodesGrid"></div>
    </div>
</div>

<script>
let appData = null;

async function loadData() {
    try {
        const url = 'https://raw.githubusercontent.com/ljv6/Dolrtv/main/content.json?t=' + Date.now();
        const res = await fetch(url);
        appData = await res.json();
        renderContent();
    } catch (err) {
        console.error('Error loading JSON:', err);
    }
}

const contentContainer = document.getElementById('main-content');

function renderContent() {
    contentContainer.innerHTML = '';

    appData.sections.forEach(section => {
        const html = `
            <div>
                <div class="section-header">
                    <h2 class="section-title">${section.title_ar}</h2>
                </div>

                <div class="items-grid">
                    ${section.channels.map(item => `
                        <div class="item-card" onclick="openEpisodes('${item.name_ar}', ${item.id})">
                            <div class="poster-wrapper">
                                <img src="${item.image}" class="item-poster" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                            </div>
                            <div class="item-info">
                                ${item.name_ar}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        contentContainer.innerHTML += html;
    });
}

const modal = document.getElementById('episodeModal');
const modalTitle = document.getElementById('modalTitle');
const episodesGrid = document.getElementById('episodesGrid');

function openEpisodes(name, id) {
    let selected = null;

    appData.sections.forEach(sec => {
        const found = sec.channels.find(c => c.id === id);
        if (found) selected = found;
    });

    if (!selected) return;

    modalTitle.innerText = name;

    const videoPlayer = document.getElementById('videoPlayer');

    episodesGrid.innerHTML = selected.episodes.map(ep => `
        <div class="episode-btn" onclick="playEpisode('${ep.url}')">
            ${ep.title}
        </div>
    `).join('');

    videoPlayer.style.display = 'none';
    videoPlayer.src = '';

    modal.style.display = 'block';
}

function playEpisode(url) {
    const videoPlayer = document.getElementById('videoPlayer');

    videoPlayer.src = url;
    videoPlayer.style.display = 'block';
    videoPlayer.play();
}

function closeModal(e) {
    if (e.target === modal) {
        modal.style.display = 'none';

        const videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.pause();
        videoPlayer.src = '';
    }
}

window.onload = () => {
    loadData();
};
</script>

</body>
</html>
