<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chem Duolingo Style</title>

<style>
body{
  font-family: Arial;
  background:#0b1320;
  color:white;
  text-align:center;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.option{
  background:#1f2937;
  color:white;
}

.option:hover{
  background:#374151;
}

.correct{
  background:#22c55e !important;
}

.wrong{
  background:#ef4444 !important;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.progress{
  height:8px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <div>🔥 Streak: <span id="streak">0</span></div>
    <div>⭐ XP: <span id="xp">0</span></div>
  </div>

  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>

  <div class="card">
    <h2 id="question"></h2>

    <div id="options"></div>

    <p id="feedback"></p>
    <p id="explain" style="color:#38bdf8;"></p>

    <button onclick="next()">Next</button>
  </div>

</div>

<script>
let xp = 0;
let streak = 0;

const questions = [
{
  type:"en_to_ar",
  q:"What is Acid?",
  correct:"حمض",
  options:["حمض","قاعدة","ملح"],
  explain:"Acid = مادة تعطي +H"
},
{
  type:"en_to_ar",
  q:"What is Base?",
  correct:"قاعدة",
  options:["حمض","قاعدة","غاز"],
  explain:"Base = تستقبل +H"
},
{
  type:"ar_to_en",
  q:"ما معنى: تبخر؟",
  correct:"Evaporation",
  options:["Evaporation","Condensation","Melting"],
  explain:"Evaporation = liquid → gas"
},
{
  type:"en_to_ar",
  q:"What is NaCl?",
  correct:"ملح",
  options:["حمض","ملح","قاعدة"],
  explain:"NaCl = salt"
}
];

let current;

function load(){
  current = questions[Math.floor(Math.random()*questions.length)];

  document.getElementById("question").innerText = current.q;

  let container = document.getElementById("options");
  container.innerHTML = "";

  current.options.sort(()=>Math.random()-0.5).forEach(opt=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.className = "option";
    btn.onclick = ()=>check(btn, opt);
    container.appendChild(btn);
  });

  document.getElementById("feedback").innerText="";
  document.getElementById("explain").innerText="";
}

function check(btn, answer){
  let buttons = document.querySelectorAll(".option");

  buttons.forEach(b=>b.disabled=true);

  if(answer === current.correct){
    btn.classList.add("correct");
    document.getElementById("feedback").innerText="✅ Correct!";
    xp += 10;
    streak++;
  } else {
    btn.classList.add("wrong");
    document.getElementById("feedback").innerText="❌ Wrong!";
    streak = 0;
  }

  document.getElementById("explain").innerText = current.explain;

  updateUI();
}

function updateUI(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("streak").innerText = streak;
  document.getElementById("bar").style.width = (xp % 100) + "%";
}

function next(){
  load();
}

load();
</script>

</body>
</html>
