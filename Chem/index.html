<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chem AI Ultimate</title>

<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  font-family:Arial;
}

.box{
  width:380px;
  margin:30px auto;
  background:#0f172a;
  padding:20px;
  border-radius:15px;
}

button{
  width:100%;
  margin:6px 0;
  padding:12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

#xpFill{
  height:10px;
  background:#22c55e;
  width:0%;
}

.small{font-size:13px;color:#94a3b8;}
.ar{color:#38bdf8;margin-top:10px;}
.ach{background:#f59e0b;margin-top:5px;padding:5px;border-radius:8px;}
</style>
</head>

<body>

<div class="box">
  <h2 id="info"></h2>

  <div style="background:#1e293b;">
    <div id="xpFill"></div>
  </div>

  <h3 id="question"></h3>

  <button onclick="answer(0)" id="b0"></button>
  <button onclick="answer(1)" id="b1"></button>
  <button onclick="answer(2)" id="b2"></button>

  <button onclick="speak()">🔊 Speak</button>
  <button onclick="toggleMode()">🔁 Switch Mode</button>
  <button onclick="toggleArabic()">🇸🇦 Arabic Explain</button>

  <p id="feedback"></p>
  <p id="explain" class="small"></p>
  <p id="arabicExplain" class="ar"></p>

  <div id="achievements"></div>

  <p class="small" id="stats"></p>

  <button onclick="next()">Next</button>
</div>

<script>
let xp = parseInt(localStorage.getItem("xp")) || 0;
let combo = 0;
let correct = parseInt(localStorage.getItem("correct")) || 0;
let wrong = parseInt(localStorage.getItem("wrong")) || 0;
let showArabic = false;
let mode = localStorage.getItem("mode") || "en_to_ar"; // or ar_to_en
let achievements = JSON.parse(localStorage.getItem("ach")) || [];

const data = [
{
  en:"Acid",
  ar:"حمض",
  def:"Donates H+",
  arExp:"الحمض مادة تعطي +H"
},
{
  en:"Base",
  ar:"قاعدة",
  def:"Accepts H+",
  arExp:"القاعدة تستقبل +H"
},
{
  en:"Evaporation",
  ar:"تبخر",
  def:"Liquid to Gas",
  arExp:"تحول السائل إلى غاز"
},
{
  en:"Exothermic",
  ar:"طارد للحرارة",
  def:"Releases heat",
  arExp:"تفاعل يطلق حرارة"
},
{
  en:"NaCl",
  ar:"ملح",
  def:"Salt",
  arExp:"كلوريد الصوديوم"
}
];

let currentQ;

function generateQuestion(){
  let item = data[Math.floor(Math.random()*data.length)];

  let questionText, correctAnswer, wrongAnswers, explainText, arabicExplain;

  if(mode === "en_to_ar"){
    questionText = "What is " + item.en + " in Arabic?";
    correctAnswer = item.ar;
    wrongAnswers = data.filter(d=>d.ar!==item.ar).map(d=>d.ar);
    explainText = item.en + " = " + item.def;
    arabicExplain = item.arExp;
  } else {
    questionText = "ما معنى: " + item.ar + " ؟";
    correctAnswer = item.en;
    wrongAnswers = data.filter(d=>d.en!==item.en).map(d=>d.en);
    explainText = item.ar + " = " + item.def;
    arabicExplain = item.arExp;
  }

  wrongAnswers = wrongAnswers.sort(()=>Math.random()-0.5).slice(0,2);

  let options = [correctAnswer, ...wrongAnswers];
  options.sort(()=>Math.random()-0.5);

  currentQ = {
    q: questionText,
    options: options,
    answer: options.indexOf(correctAnswer),
    explain: explainText,
    ar: arabicExplain
  };
}

function load(){
  generateQuestion();

  document.getElementById("info").innerText =
    "XP: " + xp + " | Combo 🔥 " + combo + " | Mode: " + mode;

  document.getElementById("question").innerText = currentQ.q;

  for(let i=0;i<3;i++){
    document.getElementById("b"+i).innerText = currentQ.options[i];
  }

  document.getElementById("feedback").innerText="";
  document.getElementById("explain").innerText="";
  document.getElementById("arabicExplain").innerText="";

  document.getElementById("stats").innerText =
    "Correct: " + correct + " | Wrong: " + wrong;

  updateXP();
}

function speak(){
  let msg = new SpeechSynthesisUtterance(currentQ.q);
  msg.lang = "en-US";
  speechSynthesis.speak(msg);
}

function toggleArabic(){
  showArabic = !showArabic;
  alert(showArabic ? "Arabic ON 🇸🇦" : "Arabic OFF");
}

function toggleMode(){
  mode = (mode === "en_to_ar") ? "ar_to_en" : "en_to_ar";
  localStorage.setItem("mode", mode);
  load();
}

function answer(i){
  if(i === currentQ.answer){
    combo++;
    xp += 10 + combo;
    correct++;
    document.getElementById("feedback").innerText="✅ Correct!";
  } else {
    combo = 0;
    xp -= 5;
    wrong++;
    document.getElementById("feedback").innerText="❌ Wrong!";
  }

  document.getElementById("explain").innerText = currentQ.explain;

  if(showArabic || i !== currentQ.answer){
    document.getElementById("arabicExplain").innerText = currentQ.ar;
  }

  checkAchievements();
  save();
  updateXP();
}

function updateXP(){
  document.getElementById("xpFill").style.width = (xp % 100) + "%";
}

function checkAchievements(){
  if(correct >= 5 && !achievements.includes("Starter")){
    addAch("🎉 Starter");
  }
  if(combo >= 5 && !achievements.includes("Combo Master")){
    addAch("🔥 Combo Master");
  }
  if(correct >= 20 && !achievements.includes("Chem Pro")){
    addAch("🧪 Chem Pro");
  }
}

function addAch(text){
  achievements.push(text);
  let div = document.createElement("div");
  div.className="ach";
  div.innerText=text;
  document.getElementById("achievements").appendChild(div);
}

function next(){
  load();
}

function save(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("correct", correct);
  localStorage.setItem("wrong", wrong);
  localStorage.setItem("ach", JSON.stringify(achievements));
}

load();
</script>

</body>
</html>
