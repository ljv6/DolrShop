<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>

<style>
:root {
  --bg: #000;
  --card: #111;
  --text: #fff;
}

.light {
  --bg: #f5f5f5;
  --card: #ddd;
  --text: #000;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* زر الوضع */
.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  padding: 10px 15px;
  border: none;
  background: var(--card);
  color: var(--text);
  border-radius: 8px;
}

/* الحاوية الرئيسية */
.clock {
  display: flex;
  gap: 40px;
}

/* العمود (ساعات / دقائق / ثواني) */
.column {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* شكل الكرت */
.flip-card {
  width: 140px;
  height: 180px;
  background: var(--card);
  border-radius: 15px;
  position: relative;
  overflow: hidden;
  perspective: 1000px;
}

/* النص */
.flip-card div {
  position: absolute;
  width: 100%;
  height: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 90px;
  font-weight: bold;
}

/* النصف العلوي */
.top {
  top: 0;
  border-bottom: 2px solid #333;
}

/* النصف السفلي */
.bottom {
  bottom: 0;
}

/* الانيميشن */
.flip {
  animation: flipAnim 0.6s ease;
}

@keyframes flipAnim {
  0% { transform: rotateX(0deg); }
  50% { transform: rotateX(-90deg); }
  100% { transform: rotateX(0deg); }
}

/* AM PM */
.ampm {
  font-size: 30px;
  margin-top: 10px;
}

/* الثواني أصغر */
.small {
  width: 100px;
  height: 120px;
}

.small div {
  font-size: 60px;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">تبديل الوضع</button>

<div class="clock">

  <!-- الساعات -->
  <div class="column">
    <div class="flip-card" id="hours">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>
  </div>

  <!-- الدقائق + الثواني -->
  <div class="column">
    <div class="flip-card" id="minutes">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>

    <!-- الثواني تحت الدقائق -->
    <div class="flip-card small" id="seconds" style="margin-top:15px;">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>
  </div>

  <!-- AM PM -->
  <div class="column">
    <div class="ampm" id="ampm">AM</div>
  </div>

</div>

<script>
function format(num) {
  return num < 10 ? "0" + num : num;
}

function updateClock() {
  const now = new Date();

  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  setFlip("hours", format(h));
  setFlip("minutes", format(m));
  setFlip("seconds", format(s));

  document.getElementById("ampm").textContent = ampm;
}

function setFlip(id, value) {
  const card = document.getElementById(id);
  const top = card.querySelector(".top");
  const bottom = card.querySelector(".bottom");

  if (top.textContent !== value) {
    top.textContent = value;
    bottom.textContent = value;

    card.classList.remove("flip");
    void card.offsetWidth;
    card.classList.add("flip");
  }
}

function toggleMode() {
  document.body.classList.toggle("light");
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
