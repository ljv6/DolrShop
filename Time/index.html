<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Clock - ساعة جمالية</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            background-color: #000; /* خلفية سوداء */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .clock-container {
            display: flex;
            gap: 20px;
        }

        /* تصميم البطاقة */
        .flip-card {
            position: relative;
            background-color: #1a1a1a;
            color: #fff; /* أرقام بيضاء */
            width: 120px;
            height: 180px;
            font-size: 100px;
            font-weight: bold;
            line-height: 180px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* الخط الفاصل في منتصف الساعة */
        .flip-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        .label {
            color: #555;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .time-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="time-group">
            <div id="hours" class="flip-card">00</div>
            <div class="label">Hours</div>
        </div>

        <div class="time-group">
            <div id="minutes" class="flip-card">00</div>
            <div class="label">Minutes</div>
        </div>

        <div class="time-group">
            <div id="seconds" class="flip-card">00</div>
            <div class="label">Seconds</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // جلب الوقت الحالي
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');

            // تحديث العناصر في الصفحة
            document.getElementById('hours').innerText = h;
            document.getElementById('minutes').innerText = m;
            document.getElementById('seconds').innerText = s;
        }

        // تحديث الساعة كل ثانية
        setInterval(updateClock, 1000);
        
        // تشغيل الدالة فور تحميل الصفحة
        updateClock();
    </script>
</body>
</html>
