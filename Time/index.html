<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Flip Clock Pro</title>

<style>
:root {
  --bg: #000;
  --card: #0a0a0a;
  --text: #fff;
}

.light {
  --bg: #f5f5f5;
  --card: #fff;
  --text: #000;
}

body {
  margin: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Arial Black', sans-serif;
}

.clock {
  display: flex;
  gap: 25px;
  align-items: center;
}

/* الكرت */
.flip-card {
  position: relative;
  width: 160px;
  height: 200px;
  perspective: 1000px;
}

.small {
  width: 120px;
  height: 150px;
}

/* النص */
.number {
  position: absolute;
  width: 100%;
  height: 100%;
  color: var(--text);
  font-size: 110px;
  font-weight: 900;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* تقسيم نصين */
.top, .bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  background: var(--card);
}

.top {
  top: 0;
  border-bottom: 2px solid #111;
}

.bottom {
  bottom: 0;
}

/* النص داخل */
.top span {
  position: absolute;
  top: 0;
}

.bottom span {
  position: absolute;
  bottom: 0;
}

/* طبقة الانيميشن */
.flip-top, .flip-bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  background: var(--card);
  backface-visibility: hidden;
}

.flip-top {
  top: 0;
  transform-origin: bottom;
  border-bottom: 2px solid #111;
}

.flip-bottom {
  bottom: 0;
  transform-origin: top;
}

/* انيميشن */
.animate .flip-top {
  animation: topFlip 0.4s forwards;
}

.animate .flip-bottom {
  animation: bottomFlip 0.4s 0.4s forwards;
}

@keyframes topFlip {
  0% { transform: rotateX(0deg); }
  100% { transform: rotateX(-90deg); }
}

@keyframes bottomFlip {
  0% { transform: rotateX(90deg); }
  100% { transform: rotateX(0deg); }
}

/* AM PM */
.ampm {
  font-size: 30px;
  color: var(--text);
}
</style>
</head>

<body>

<div class="clock">
  <div class="flip-card" id="hours"></div>
  <div class="flip-card" id="minutes"></div>
  <div class="flip-card small" id="seconds"></div>
  <div class="ampm" id="ampm">PM</div>
</div>

<script>
function createCard(id) {
  const el = document.getElementById(id);

  el.innerHTML = `
    <div class="top"><span>00</span></div>
    <div class="bottom"><span>00</span></div>

    <div class="flip-top"><span>00</span></div>
    <div class="flip-bottom"><span>00</span></div>
  `;
}

["hours","minutes","seconds"].forEach(createCard);

function format(n){ return n<10?"0"+n:n; }

let prev = {h:null,m:null,s:null};

function update(){
  const now = new Date();

  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const ampm = h>=12?"PM":"AM";
  h = h%12 || 12;

  if(prev.h!==h){ flip("hours",format(h)); prev.h=h; }
  if(prev.m!==m){ flip("minutes",format(m)); prev.m=m; }
  if(prev.s!==s){ flip("seconds",format(s)); prev.s=s; }

  document.getElementById("ampm").textContent=ampm;
}

function flip(id,newVal){
  const card = document.getElementById(id);

  const top = card.querySelector(".top span");
  const bottom = card.querySelector(".bottom span");
  const flipTop = card.querySelector(".flip-top span");
  const flipBottom = card.querySelector(".flip-bottom span");

  flipTop.textContent = top.textContent;
  flipBottom.textContent = newVal;

  card.classList.add("animate");

  setTimeout(()=>{
    top.textContent = newVal;
    bottom.textContent = newVal;
    card.classList.remove("animate");
  },800);
}

setInterval(update,1000);
update();
</script>

</body>
</html>
