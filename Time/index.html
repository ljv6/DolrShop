<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Flip Clock</title>

<style>
:root {
  --bg: #000;
  --card: #111;
  --text: #fff;
}

.light {
  --bg: #f5f5f5;
  --card: #ddd;
  --text: #000;
}

body {
  margin: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* زر */
.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--card);
  color: var(--text);
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.clock {
  display: flex;
  gap: 25px;
  align-items: center;
}

/* الكرت */
.flip-card {
  position: relative;
  width: 140px;
  height: 180px;
  perspective: 1000px;
}

.flip-card.small {
  width: 100px;
  height: 140px;
}

/* الجزء الثابت */
.card-face {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  background: var(--card);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 90px;
}

.flip-card.small .card-face {
  font-size: 60px;
}

.top-static {
  top: 0;
  border-bottom: 2px solid #333;
}

.bottom-static {
  bottom: 0;
}

/* المتحرك */
.flip-top,
.flip-bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  background: var(--card);
  display: flex;
  justify-content: center;
  align-items: center;
  backface-visibility: hidden;
  transform-origin: center bottom;
}

.flip-top {
  top: 0;
  border-bottom: 2px solid #333;
}

.flip-bottom {
  bottom: 0;
  transform-origin: center top;
}

/* نص داخل المتحرك */
.flip-top span,
.flip-bottom span {
  font-size: 90px;
  font-weight: bold;
}

.flip-card.small .flip-top span,
.flip-card.small .flip-bottom span {
  font-size: 60px;
}

/* انيميشن */
.flip-card.animate .flip-top {
  animation: flipTop 0.4s forwards;
}

.flip-card.animate .flip-bottom {
  animation: flipBottom 0.4s 0.4s forwards;
}

@keyframes flipTop {
  0% { transform: rotateX(0); }
  100% { transform: rotateX(-90deg); }
}

@keyframes flipBottom {
  0% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

/* AM PM */
.ampm {
  font-size: 30px;
  color: var(--text);
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">تبديل الوضع</button>

<div class="clock">

  <div class="flip-card" id="hours"></div>
  <div class="flip-card" id="minutes"></div>
  <div class="flip-card small" id="seconds"></div>
  <div class="ampm" id="ampm">AM</div>

</div>

<script>
function createCard(id) {
  const el = document.getElementById(id);

  el.innerHTML = `
    <div class="card-face top-static">00</div>
    <div class="card-face bottom-static">00</div>

    <div class="flip-top"><span>00</span></div>
    <div class="flip-bottom"><span>00</span></div>
  `;
}

["hours","minutes","seconds"].forEach(createCard);

function format(n) {
  return n < 10 ? "0" + n : n;
}

let prev = {h:null, m:null, s:null};

function update() {
  const now = new Date();

  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  if (prev.h !== h) flip("hours", format(h)), prev.h = h;
  if (prev.m !== m) flip("minutes", format(m)), prev.m = m;
  if (prev.s !== s) flip("seconds", format(s)), prev.s = s;

  document.getElementById("ampm").textContent = ampm;
}

function flip(id, newVal) {
  const card = document.getElementById(id);

  const topStatic = card.querySelector(".top-static");
  const bottomStatic = card.querySelector(".bottom-static");
  const flipTop = card.querySelector(".flip-top span");
  const flipBottom = card.querySelector(".flip-bottom span");

  flipTop.textContent = topStatic.textContent;
  flipBottom.textContent = newVal;

  card.classList.add("animate");

  setTimeout(() => {
    topStatic.textContent = newVal;
    bottomStatic.textContent = newVal;
    card.classList.remove("animate");
  }, 800);
}

function toggleMode() {
  document.body.classList.toggle("light");
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
