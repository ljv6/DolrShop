<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>

<style>
:root {
  --bg:#000;
  --card:#0d0d0d;
  --text:#fff;
}

body {
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial Black, sans-serif;
}

.clock {
  display:flex;
  gap:20px;
  align-items:center;
}

/* الكرت */
.flip-card {
  position:relative;
  width:150px;
  height:180px;
  perspective:1000px;
}

.small {
  width:110px;
  height:140px;
}

/* نص */
.half {
  position:absolute;
  width:100%;
  height:50%;
  overflow:hidden;
  background:var(--card);
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
  font-size:100px;
  font-weight:900;
}

.small .half {
  font-size:60px;
}

/* فوق */
.top {
  top:0;
  border-bottom:2px solid #111;
}

/* تحت */
.bottom {
  bottom:0;
}

/* طبقات الانيميشن */
.flip-top, .flip-bottom {
  position:absolute;
  width:100%;
  height:50%;
  overflow:hidden;
  background:var(--card);
  display:flex;
  justify-content:center;
  align-items:center;
  backface-visibility:hidden;
  color:var(--text);
}

.flip-top {
  top:0;
  transform-origin:bottom;
  border-bottom:2px solid #111;
}

.flip-bottom {
  bottom:0;
  transform-origin:top;
}

/* انيميشن */
.animate .flip-top {
  animation:flipTop 0.4s forwards;
}

.animate .flip-bottom {
  animation:flipBottom 0.4s 0.4s forwards;
}

@keyframes flipTop {
  0% {transform:rotateX(0);}
  100% {transform:rotateX(-90deg);}
}

@keyframes flipBottom {
  0% {transform:rotateX(90deg);}
  100% {transform:rotateX(0);}
}

/* AMPM */
.ampm {
  font-size:30px;
  color:var(--text);
}
</style>
</head>

<body>

<div class="clock">
  <div class="flip-card" id="h"></div>
  <div class="flip-card" id="m"></div>
  <div class="flip-card small" id="s"></div>
  <div class="ampm" id="ap">AM</div>
</div>

<script>
function create(el){
  el.innerHTML = `
    <div class="half top">00</div>
    <div class="half bottom">00</div>
    <div class="flip-top">00</div>
    <div class="flip-bottom">00</div>
  `;
}

create(h);
create(m);
create(s);

function f(n){return n<10?"0"+n:n;}

let prev={h:null,m:null,s:null};

function tick(){
  let d=new Date();
  let H=d.getHours(),M=d.getMinutes(),S=d.getSeconds();

  let ap=H>=12?"PM":"AM";
  H=H%12||12;

  if(prev.h!==H){flip(h,f(H));prev.h=H;}
  if(prev.m!==M){flip(m,f(M));prev.m=M;}
  if(prev.s!==S){flip(s,f(S));prev.s=S;}

  document.getElementById("ap").textContent=ap;
}

function flip(el,val){
  let top=el.querySelector(".top");
  let bottom=el.querySelector(".bottom");
  let ft=el.querySelector(".flip-top");
  let fb=el.querySelector(".flip-bottom");

  ft.textContent=top.textContent;
  fb.textContent=val;

  el.classList.add("animate");

  setTimeout(()=>{
    top.textContent=val;
    bottom.textContent=val;
    el.classList.remove("animate");
  },800);
}

setInterval(tick,1000);
tick();
</script>

</body>
</html>
