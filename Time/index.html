<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<title>Clean Flip Clock</title>

<style>
:root{
  --bg:#000;
  --card:#0a0a0a;
  --text:#fff;
}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Bebas Neue', sans-serif;
}

/* layout */
.clock{
  display:flex;
  gap:25px;
  align-items:center;
}

/* الكرت */
.flip{
  position:relative;
  width:160px;
  height:200px;
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  perspective:1000px;
}

.small{
  width:120px;
  height:150px;
}

/* الرقم الثابت */
.display{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:140px;
  color:var(--text);
}

.small .display{
  font-size:80px;
}

/* خط المنتصف */
.display::after{
  content:"";
  position:absolute;
  width:100%;
  height:2px;
  background:#111;
  top:50%;
  transform:translateY(-50%);
}

/* اللوح المتحرك */
.flip-layer{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:140px;
  color:var(--text);
  background:var(--card);
  transform-origin:top;
  backface-visibility:hidden;
}

.small .flip-layer{
  font-size:80px;
}

/* ظل */
.flip-layer::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  opacity:0;
}

/* الانيميشن */
.animate{
  animation:flip 0.6s ease;
}

.animate::after{
  animation:shadow 0.6s ease;
}

@keyframes flip{
  0%{ transform:rotateX(0);}
  50%{ transform:rotateX(-90deg);}
  100%{ transform:rotateX(0);}
}

@keyframes shadow{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* AM PM */
.ampm{
  font-size:40px;
  color:#fff;
}
</style>
</head>

<body>

<div class="clock">
  <div class="flip" id="h"></div>
  <div class="flip" id="m"></div>
  <div class="flip small" id="s"></div>
  <div class="ampm" id="ap">PM</div>
</div>

<script>
function create(el){
  el.innerHTML=`
    <div class="display">00</div>
    <div class="flip-layer" style="display:none;">00</div>
  `;
}

create(h);
create(m);
create(s);

function f(n){return n<10?"0"+n:n;}

let prev={h:null,m:null,s:null};

function tick(){
  let d=new Date();
  let H=d.getHours(),M=d.getMinutes(),S=d.getSeconds();

  let ap=H>=12?"PM":"AM";
  H=H%12||12;

  if(prev.h!==H){flip(h,f(H));prev.h=H;}
  if(prev.m!==M){flip(m,f(M));prev.m=M;}
  if(prev.s!==S){flip(s,f(S));prev.s=S;}

  apEl.textContent=ap;
}

function flip(el,val){
  let display=el.querySelector(".display");
  let layer=el.querySelector(".flip-layer");

  layer.textContent=val;
  layer.style.display="flex";

  layer.classList.remove("animate");
  void layer.offsetWidth;
  layer.classList.add("animate");

  setTimeout(()=>{
    display.textContent=val;
    layer.style.display="none";
  },600);
}

const apEl=document.getElementById("ap");

setInterval(tick,1000);
tick();
</script>

</body>
</html>
