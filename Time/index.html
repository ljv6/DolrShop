<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock Clean</title>

<style>
:root {
  --bg: #000;
  --card: #000;
  --text: #fff;
  --line: #222;
}

.light {
  --bg: #f5f5f5;
  --card: #fff;
  --text: #000;
  --line: #ccc;
}

body {
  margin: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* زر */
.toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--line);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.clock {
  display: flex;
  gap: 25px;
  align-items: center;
}

/* الكرت */
.flip-card {
  position: relative;
  width: 140px;
  height: 180px;
  background: var(--card);
  border-radius: 15px;
  overflow: hidden;
  perspective: 1000px;
}

.flip-card.small {
  width: 100px;
  height: 140px;
}

/* النص الأساسي */
.display {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 90px;
  font-weight: bold;
  color: var(--text);
}

.flip-card.small .display {
  font-size: 60px;
}

/* الطبقة المتحركة */
.flip-layer {
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--card);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 90px;
  font-weight: bold;
  color: var(--text);
  transform-origin: top;
  backface-visibility: hidden;
}

.flip-card.small .flip-layer {
  font-size: 60px;
}

/* الانيميشن */
.animate {
  animation: flip 0.6s ease;
}

@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(-90deg); }
  100% { transform: rotateX(0); }
}

/* AM PM */
.ampm {
  font-size: 30px;
  color: var(--text);
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">تبديل الوضع</button>

<div class="clock">
  <div class="flip-card" id="hours"></div>
  <div class="flip-card" id="minutes"></div>
  <div class="flip-card small" id="seconds"></div>
  <div class="ampm" id="ampm">AM</div>
</div>

<script>
function createCard(id) {
  const el = document.getElementById(id);
  el.innerHTML = `
    <div class="display">00</div>
    <div class="flip-layer" style="display:none;">00</div>
  `;
}

["hours","minutes","seconds"].forEach(createCard);

function format(n) {
  return n < 10 ? "0" + n : n;
}

let prev = {h:null, m:null, s:null};

function update() {
  const now = new Date();

  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  if (prev.h !== h) flip("hours", format(h)), prev.h = h;
  if (prev.m !== m) flip("minutes", format(m)), prev.m = m;
  if (prev.s !== s) flip("seconds", format(s)), prev.s = s;

  document.getElementById("ampm").textContent = ampm;
}

function flip(id, newVal) {
  const card = document.getElementById(id);
  const display = card.querySelector(".display");
  const layer = card.querySelector(".flip-layer");

  layer.textContent = newVal;
  layer.style.display = "flex";

  card.classList.remove("animate");
  void card.offsetWidth;
  card.classList.add("animate");

  setTimeout(() => {
    display.textContent = newVal;
    layer.style.display = "none";
  }, 600);
}

function toggleMode() {
  document.body.classList.toggle("light");
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
