<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- الخط -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<title>Pro Flip Clock</title>

<style>
:root{
  --bg:#000;
  --card:#0a0a0a;
  --text:#fff;
}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Bebas Neue', sans-serif;
}

/* الحاوية */
.clock{
  display:flex;
  gap:25px;
  align-items:center;
}

/* الكرت */
.flip{
  position:relative;
  width:160px;
  height:200px;
  perspective:1200px;
}

.small{
  width:120px;
  height:150px;
}

/* نص */
.half{
  position:absolute;
  width:100%;
  height:50%;
  overflow:hidden;
  background:var(--card);
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
  font-size:140px;
  letter-spacing:2px;
}

.small .half{
  font-size:80px;
}

/* تقسيم */
.top{
  top:0;
  border-bottom:2px solid #111;
}

.bottom{
  bottom:0;
}

/* ظل واقعي */
.top::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.6));
  pointer-events:none;
}

.bottom::before{
  content:"";
  position:absolute;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(to top, transparent, rgba(0,0,0,0.6));
  pointer-events:none;
}

/* طبقات الانيميشن */
.flip-top,.flip-bottom{
  position:absolute;
  width:100%;
  height:50%;
  overflow:hidden;
  background:var(--card);
  display:flex;
  justify-content:center;
  align-items:center;
  backface-visibility:hidden;
  color:var(--text);
}

.flip-top{
  top:0;
  transform-origin:bottom;
  border-bottom:2px solid #111;
}

.flip-bottom{
  bottom:0;
  transform-origin:top;
}

/* الظل أثناء الحركة */
.flip-top::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  opacity:0;
}

.animate .flip-top::after{
  animation:shadowTop 0.4s forwards;
}

@keyframes shadowTop{
  0%{opacity:0;}
  100%{opacity:1;}
}

/* انيميشن */
.animate .flip-top{
  animation:flipTop 0.4s forwards;
}

.animate .flip-bottom{
  animation:flipBottom 0.4s 0.4s forwards;
}

@keyframes flipTop{
  0%{transform:rotateX(0);}
  100%{transform:rotateX(-90deg);}
}

@keyframes flipBottom{
  0%{transform:rotateX(90deg);}
  100%{transform:rotateX(0);}
}

/* AMPM */
.ampm{
  font-size:40px;
  color:#fff;
}
</style>
</head>

<body>

<div class="clock">
  <div class="flip" id="h"></div>
  <div class="flip" id="m"></div>
  <div class="flip small" id="s"></div>
  <div class="ampm" id="ap">PM</div>
</div>

<script>
function create(el){
  el.innerHTML=`
    <div class="half top">00</div>
    <div class="half bottom">00</div>
    <div class="flip-top">00</div>
    <div class="flip-bottom">00</div>
  `;
}

create(h);
create(m);
create(s);

function f(n){return n<10?"0"+n:n;}

let prev={h:null,m:null,s:null};

function tick(){
  let d=new Date();
  let H=d.getHours(),M=d.getMinutes(),S=d.getSeconds();

  let ap=H>=12?"PM":"AM";
  H=H%12||12;

  if(prev.h!==H){flip(h,f(H));prev.h=H;}
  if(prev.m!==M){flip(m,f(M));prev.m=M;}
  if(prev.s!==S){flip(s,f(S));prev.s=S;}

  apEl.textContent=ap;
}

function flip(el,val){
  let top=el.querySelector(".top");
  let bottom=el.querySelector(".bottom");
  let ft=el.querySelector(".flip-top");
  let fb=el.querySelector(".flip-bottom");

  ft.textContent=top.textContent;
  fb.textContent=val;

  el.classList.add("animate");

  setTimeout(()=>{
    top.textContent=val;
    bottom.textContent=val;
    el.classList.remove("animate");
  },800);
}

const apEl=document.getElementById("ap");

setInterval(tick,1000);
tick();
</script>

</body>
</html>
