<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYNLR</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f5f0e8;
  --card: #ffffff;
  --text-dark: #1a1410;
  --text-mid: #5a4f40;
  --text-light: #9a8f80;
  --accent: #c0392b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 60px;
}

header {
  width:100%;
  padding:30px 40px 18px;
  display:flex;
  align-items:baseline;
  gap:14px;
}

header h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:2.2rem;
  letter-spacing:0.25em;
  color:var(--text-dark);
}

header span {
  font-family:'Space Mono',monospace;
  font-size:0.6rem;
  color:var(--text-light);
}

.card {
  width:min(560px,94vw);
  background:var(--card);
  border-radius:22px;
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
  overflow:hidden;
}

.top {
  position:relative;
  height:290px;
  background:#18100a;
}

.art-zone {
  position:absolute;
  top:0; right:0;
  width:56%;
  height:100%;
}

.art-zone img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.art-placeholder {
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#2a1f15,#120c07);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
}

.vinyl-wrap {
  position:absolute;
  top:50%;
  left:2%;
  transform:translateY(-50%);
  width:54%;
}

.vinyl-disc {
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  animation:spin 3s linear infinite paused;
}

.vinyl-disc.playing {
  animation-play-state:running;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.bottom {
  padding:22px;
}

.song {
  font-weight:bold;
}

.pill {
  display:inline-block;
  padding:4px 10px;
  background:#eee;
  border-radius:20px;
  font-size:12px;
}

.prog-bar {
  width:100%;
  height:4px;
  background:#ddd;
  margin:10px 0;
  cursor:pointer;
}

.prog-fill {
  height:100%;
  width:0%;
  background:#333;
}
</style>
</head>

<body>

<header>
  <h1>VYNLR</h1>
  <span>مشغل الأسطوانات</span>
</header>

<div class="card">

  <div class="top">

    <!-- الصورة -->
    <div class="art-zone">
      <img id="art-img">
    </div>

    <!-- الأسطوانة -->
    <div class="vinyl-wrap">
      <div class="vinyl-disc" id="vdisc">
        <svg viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="100" fill="#ddd"/>
          <circle cx="100" cy="100" r="30" fill="#fff"/>
        </svg>
      </div>
    </div>

  </div>

  <div class="bottom">

    <div class="song" id="song-t">لا يوجد مقطع</div>
    <div class="pill" id="pill">موقوف</div>

    <div class="prog-bar" onclick="seek(event)">
      <div class="prog-fill" id="prog-fill"></div>
    </div>

    <input id="yt-url" placeholder="ضع رابط يوتيوب هنا" style="width:100%;padding:10px;margin-top:10px;">

    <button onclick="loadYT()" style="margin-top:10px;padding:10px;width:100%;">
      تشغيل
    </button>

  </div>

</div>

<iframe id="yt-frame" style="display:none;" allow="autoplay"></iframe>

<script>
let ytId = null;
let playing = false;
let pSec = 0;
let dur = 240;
let timer = null;

// استخراج ID
function getYTId(url){
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// تحميل الفيديو
function loadYT(){
  const url = document.getElementById('yt-url').value;
  const id = getYTId(url);

  if(!id){
    alert("رابط غير صحيح");
    return;
  }

  ytId = id;

  // تشغيل الفيديو
  document.getElementById('yt-frame').src =
    `https://www.youtube.com/embed/${id}?autoplay=1`;

  // جلب الصورة تلقائياً
  const img = document.getElementById('art-img');
  const max = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
  const fallback = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

  img.onerror = () => img.src = fallback;
  img.src = max;

  document.getElementById('song-t').textContent = "مقطع يوتيوب";
  setPlay(true);
}

// تشغيل / إيقاف
function setPlay(state){
  playing = state;

  document.getElementById('vdisc')
    .classList.toggle('playing', state);

  document.getElementById('pill').textContent =
    state ? "يعمل" : "موقوف";

  if(state) start();
  else stop();
}

// progress
function start(){
  stop();
  timer = setInterval(()=>{
    pSec++;
    if(pSec>=dur) pSec=0;
    update();
  },1000);
}

function stop(){
  clearInterval(timer);
}

function update(){
  document.getElementById('prog-fill').style.width =
    (pSec/dur*100)+"%";
}

// seek
function seek(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  pSec = Math.floor((x/rect.width)*dur);
  update();
}
</script>

</body>
</html>
