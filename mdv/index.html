<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Vinyl Player</title>

<style>
body{
  background:#0b1320;
  color:white;
  text-align:center;
  font-family:Arial;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

.vinyl{
  width:200px;
  height:200px;
  border-radius:50%;
  background:#111;
  margin:20px auto;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.vinyl img{
  width:100%;
  height:100%;
  object-fit:cover;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.play{background:#22c55e;}
.pause{background:#ef4444;}
.open{background:#3b82f6;}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <h2>🎵 YouTube Vinyl Player</h2>

  <div class="vinyl">
    <img id="thumb" src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg">
  </div>

  <input id="url" placeholder="Paste YouTube URL here">

  <button onclick="loadVideo()">Load Video</button>

  <div id="player"></div>

  <button class="play" onclick="playVideo()">▶️ Play</button>
  <button class="pause" onclick="pauseVideo()">⏸ Pause</button>
  <button class="open" onclick="openYT()">🔗 Open YouTube</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let currentVideoId = "dQw4w9WgXcQ";

function extractVideoId(url){
  let match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  return match ? match[1] : null;
}

function loadVideo(){
  let url = document.getElementById("url").value;
  let id = extractVideoId(url);

  if(!id){
    alert("Invalid YouTube URL");
    return;
  }

  currentVideoId = id;

  document.getElementById("thumb").src =
    "https://img.youtube.com/vi/" + id + "/0.jpg";

  if(player){
    player.loadVideoById(id);
  } else {
    player = new YT.Player('player', {
      height: '0',
      width: '0',
      videoId: id
    });
  }
}

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: currentVideoId
  });
}

function playVideo(){
  if(player) player.playVideo();
}

function pauseVideo(){
  if(player) player.pauseVideo();
}

function openYT(){
  window.open("https://www.youtube.com/watch?v=" + currentVideoId, "_blank");
}
</script>

</body>
</html>
