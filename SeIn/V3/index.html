<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة المملكة الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
  --gold:#C9A84C;
  --dark:#0A0A0F;
  --light:#ffffff;
  --card:#16161F;
}

body{
  margin:0;
  font-family:'Tajawal';
  background:var(--dark);
  color:white;
  transition:0.3s;
}

.light{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:linear-gradient(90deg,#111,#222);
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:10px;
  flex-wrap:wrap;
}

input,button{
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:var(--gold);
  cursor:pointer;
}

/* MAP */
#map{
  height:400px;
}

/* PANEL */
.panel{
  padding:15px;
  background:#111;
}

/* ANIMATION */
.fade{
  animation:fadeIn 0.5s;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="header">
  <h2>🗺️ خريطة المملكة الذكية</h2>
</div>

<div class="controls">
  <input id="search" placeholder="ابحث عن منطقة..." onkeyup="searchRegion()">
  <button onclick="toggleMode()">🌙/☀️</button>
  <button onclick="speak()">🎤 قراءة</button>
</div>

<div id="map"></div>

<div class="panel fade" id="info">اختر منطقة من الخريطة</div>

<div class="panel">
  <h3>🎯 Quiz</h3>
  <p id="quizQ"></p>
  <button onclick="answer(true)">صح</button>
  <button onclick="answer(false)">خطأ</button>
  <p id="quizResult"></p>
</div>

<div class="panel">
  <h3>🤖 المساعد</h3>
  <input id="q" placeholder="اسأل...">
  <button onclick="askAI()">اسأل</button>
  <p id="ai"></p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* MAP */
var map = L.map('map').setView([23.8,45.0],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* DATA */
const regions = {
  asir:{
    name:"عسير",
    coords:[18.2,42.5],
    info:"عسير: الزراعة والحرف - الأكلات: الحنيذ والعريكة"
  },
  qassim:{
    name:"القصيم",
    coords:[26.3,43.9],
    info:"القصيم: مركز التمور والزراعة"
  },
  north:{
    name:"الحدود الشمالية",
    coords:[30.0,42.0],
    info:"الحدود الشمالية: درب زبيدة"
  }
};

/* ADD MARKERS */
for(let key in regions){
  let r=regions[key];

  let marker=L.marker(r.coords).addTo(map);

  marker.on('click',()=>{
    document.getElementById("info").innerText=r.info;
  });
}

/* SEARCH */
function searchRegion(){
  let v=document.getElementById("search").value;
  for(let k in regions){
    if(regions[k].name.includes(v)){
      map.setView(regions[k].coords,8);
      document.getElementById("info").innerText=regions[k].info;
    }
  }
}

/* DARK MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* SPEECH */
function speak(){
  let text=document.getElementById("info").innerText;
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="ar-SA";
  speechSynthesis.speak(speech);
}

/* QUIZ */
const quiz = [
  {q:"القصيم تشتهر بالتمور",a:true},
  {q:"درب زبيدة في عسير",a:false}
];
let i=0;

function loadQ(){
  document.getElementById("quizQ").innerText=quiz[i].q;
}
loadQ();

function answer(a){
  document.getElementById("quizResult").innerText =
    a==quiz[i].a ? "✅ صحيح" : "❌ خطأ";

  i=(i+1)%quiz.length;
  setTimeout(loadQ,1000);
}

/* AI MOCK */
function askAI(){
  let q=document.getElementById("q").value;

  let res="";

  if(q.includes("عسير")) res="عسير منطقة زراعية وتشتهر بالحنيذ";
  else if(q.includes("القصيم")) res="القصيم رائدة في التمور";
  else if(q.includes("زبيدة")) res="درب زبيدة طريق للحجاج";
  else res="غير متوفر";

  document.getElementById("ai").innerText=res;
}

</script>

</body>
</html>
