<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مشروع مطور</title>

<style>
:root {
    --primary: #6366f1;
    --bg: #0f172a;
    --text: #fff;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text);
    overflow:hidden; /* مهم */
    font-family:sans-serif;
}

/* كل سكشن = صفحة */
section {
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    transition:1s ease;
}

/* أزرار */
.page-controls {
    position: fixed;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    z-index:1000;
}

.page-controls button {
    display:block;
    margin:10px;
    padding:10px 15px;
    border:none;
    background:var(--primary);
    color:white;
    cursor:pointer;
}

/* محتوى بسيط */
h1 {font-size:3rem;}
</style>
</head>

<body>

<div class="page-controls">
    <button onclick="prevSection()">⬅</button>
    <button onclick="nextSection()">➡</button>
</div>

<section style="background:#1e293b;">
    <h1>البداية</h1>
</section>

<section style="background:#0f172a;">
    <h1>المعرض</h1>
</section>

<section style="background:#1e293b;">
    <h1>الحركة</h1>
</section>

<section style="background:#020617;">
    <h1>التفاعلية</h1>
</section>

<script>
const sections = document.querySelectorAll("section");
let current = 0;

function updateSections() {
    sections.forEach((sec, i) => {
        sec.style.transform = `translateY(${(i - current) * 100}%)`;
    });
}

function nextSection() {
    if (current < sections.length - 1) {
        current++;
        updateSections();
    }
}

function prevSection() {
    if (current > 0) {
        current--;
        updateSections();
    }
}

/* دعم السكروول */
window.addEventListener("wheel", (e) => {
    if (e.deltaY > 0) nextSection();
    else prevSection();
});

/* أول تحميل */
updateSections();
</script>

</body>
</html>
