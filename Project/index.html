<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشروع الرسوم الحاسوبية</title>

<style>
:root {
    --primary: #6366f1;
    --secondary: #a855f7;
    --accent: #f43f5e;
    --bg: #0f172a;
    --text: #f8fafc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
    overflow-y: scroll;
}

section {
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    scroll-snap-align: start;
}

h1, h2, h3 {
    margin-bottom: 20px;
}

.page-controls {
    position: fixed;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    z-index: 999;
}

.page-controls button {
    display: block;
    margin: 10px 0;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    cursor: pointer;
    font-size: 18px;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    width: 100%;
    max-width: 1000px;
}

.gallery-card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.4s ease;
}

.gallery-card:hover {
    transform: translateY(-10px) scale(1.03);
}

.gallery-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-body {
    padding: 15px;
}

.motion-canvas {
    width: 80%;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.tween-object {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: moveBox 6s infinite ease-in-out;
}

@keyframes moveBox {
    0% { transform: translateX(-150px) rotate(0deg); }
    50% { transform: translateX(150px) rotate(180deg) scale(1.3); }
    100% { transform: translateX(-150px) rotate(360deg); }
}

.mask-container {
    width: 80%;
    max-width: 500px;
    height: 300px;
    background: url('img_resolution.png') center/cover;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
}

.mask-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.8);
    mask-image: radial-gradient(circle 80px at var(--x,50%) var(--y,50%), transparent 100%, black 100%);
    -webkit-mask-image: radial-gradient(circle 80px at var(--x,50%) var(--y,50%), transparent 100%, black 100%);
}

.blur-demo {
    margin-top: 30px;
    padding: 20px;
    backdrop-filter: blur(var(--blur,0px));
    transition: 0.4s;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
}

.btn {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="page-controls">
    <button onclick="prevSection()">⬆</button>
    <button onclick="nextSection()">⬇</button>
</div>

<section>
    <h1>الرسوم الحاسوبية</h1>
    <p>رحلة تعليمية في عالم البكسل والمتجهات</p>
</section>

<section>
    <h2>معرض المفاهيم التعليمية</h2>
    <div class="gallery-grid">
        <div class="gallery-card">
            <img src="img_raster.png">
            <div class="card-body"><h3>Raster</h3></div>
        </div>
        <div class="gallery-card">
            <img src="img_vector.png">
            <div class="card-body"><h3>Vector</h3></div>
        </div>
        <div class="gallery-card">
            <img src="img_rgb.png">
            <div class="card-body"><h3>RGB</h3></div>
        </div>
        <div class="gallery-card">
            <img src="img_cmyk.png">
            <div class="card-body"><h3>CMYK</h3></div>
        </div>
    </div>
</section>

<section>
    <h2>Motion Tween</h2>
    <div class="motion-canvas">
        <div class="tween-object">MOVE</div>
    </div>
</section>

<section>
    <h2>التفاعلية</h2>
    <div class="mask-container" onmousemove="handleMask(event)">
        <div class="mask-overlay" id="maskLayer"></div>
    </div>

    <div class="blur-demo" id="blurBox">
        <h3>Blur Effect</h3>
        <button class="btn" onclick="toggleBlur()">Toggle Blur</button>
    </div>
</section>

<script>
const sections = document.querySelectorAll("section");
let current = 0;

function goToSection(index){
    sections[index].scrollIntoView({behavior:"smooth"});
    current = index;
}

function nextSection(){
    if(current < sections.length-1){
        goToSection(current+1);
    }
}

function prevSection(){
    if(current > 0){
        goToSection(current-1);
    }
}

window.addEventListener("scroll",()=>{
    sections.forEach((sec,i)=>{
        const rect = sec.getBoundingClientRect();
        if(rect.top >= -window.innerHeight/2 && rect.top < window.innerHeight/2){
            current = i;
        }
    });
});

function handleMask(e){
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100 + "%";
    const y = ((e.clientY - rect.top) / rect.height) * 100 + "%";
    const mask = document.getElementById("maskLayer");
    mask.style.setProperty("--x", x);
    mask.style.setProperty("--y", y);
}

let blurOn = false;
function toggleBlur(){
    blurOn = !blurOn;
    document.getElementById("blurBox").style.setProperty("--blur", blurOn ? "10px" : "0px");
}
</script>

</body>
</html>
