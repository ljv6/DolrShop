<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة Dolr | الخدمات الطلابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020b13; --card-bg: #0a1622; --primary: #3b82f6;
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #0a1b2d 0%, #020b13 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: var(--text-main);
        }
        .card {
            background: var(--card-bg); width: 100%; max-width: 450px; padding: 2rem;
            border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        header { text-align: center; margin-bottom: 1.5rem; }
        .logo-img { width: 80px; margin-bottom: 0.5rem; border-radius: 15px; border: 1px solid var(--primary); }

        .products-grid { display: grid; gap: 10px; margin-bottom: 1.5rem; }
        .product-item {
            background: #111e2d; border: 1px solid var(--border); padding: 12px;
            border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.3s;
        }
        .product-item:hover, .product-item.active { border-color: var(--primary); background: #0d1a29; transform: scale(1.02); }
        .product-item h3 { font-size: 0.9rem; }
        .product-item span { color: var(--primary); font-weight: 800; }

        #paymentForm { display: none; border-top: 1px solid var(--border); padding-top: 1.5rem; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-group { margin-bottom: 1rem; text-align: right; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; color: var(--text-dim); }
        input {
            width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 10px;
            background: #111e2d; color: white; text-align: right; outline: none;
        }

        .btn {
            width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-box { margin-top: 1rem; padding: 0.8rem; border-radius: 10px; text-align: center; font-size: 0.85rem; display: none; }
        .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .processing { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <header>
        <img src="IMG_7454.jpeg" class="logo-img">
        <h2 style="font-size: 1.2rem;">منصة Dolr <span>للخدمات الطلابية</span></h2>
        <p style="font-size: 0.75rem; color: var(--text-dim);">اختر الخدمة لإتمام الطلب</p>
    </header>

    <div class="products-grid">
        <div class="product-item" onclick="selectP(this, 'حل واجب', 10)">
            <h3>حل واجب</h3><span>10 ريال</span>
        </div>

        <div class="product-item" onclick="selectP(this, 'بحث', 20)">
            <h3>بحث</h3><span>20 ريال</span>
        </div>

        <div class="product-item" onclick="selectP(this, 'عرض تقديمي', 150)">
            <h3>عرض تقديمي</h3><span>150 ريال</span>
        </div>
    </div>

    <form id="paymentForm">
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label>رقم الجوال</label>
            <input type="tel" id="phone" required>
        </div>

        <button type="submit" class="btn" id="payBtn">
            <span id="btnText">تأكيد الطلب</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div id="statusBox" class="status-box"></div>
</div>

<script>
    const BOT_CONFIG = { TOKEN: "8254444681:AAHYJz1CtqVTT1ovCVUOPCckj3AySLAs8UI", CHAT_ID: "591768998" };
    const CONFIG = {
        MID: "983c9669-9278-4dd1-950f-8b8fbb0a14d2",
        PASS: "7ceb6437-92bc-411b-98fa-be054b39eaba",
        API: "https://api.edfapay.com/payment/initiate",
        FIXED_EMAIL: "maxmohamedmoon@gmail.com"
    };

    let selected = { name: '', price: 0 };

    function selectP(el, n, p) {
        document.querySelectorAll('.product-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        // ⭐ تخصيص سعر عرض تقديمي
        if (n === "عرض تقديمي") {
            const custom = prompt("اكتب السعر المطلوب أو اضغط OK للسعر الافتراضي (150):");
            if (custom && !isNaN(custom)) {
                p = parseFloat(custom);
            }
        }

        selected = { name: n, price: p };
        document.getElementById('paymentForm').style.display = 'block';
    }

    function sendNotify(msg) {
        const url = `https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
        new Image().src = url;
    }

    function md5(string) {
        function rotateLeft(lValue, iShiftBits) { return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits)); }
        function addUnsigned(lX, lY) {
            var lX4, lY4, lX8, lY8, lResult;
            lX8 = (lX & 0x80000000); lY8 = (lY & 0x80000000);
            lX4 = (lX & 0x40000000); lY4 = (lY & 0x40000000);
            lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
            if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
            if (lX4 | lY4) {
                if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
            } else return (lResult ^ lX8 ^ lY8);
        }

        function F(x,y,z){return(x&y)|((~x)&z)}
        function G(x,y,z){return(x&z)|(y&(~z))}
        function H(x,y,z){return(x^y^z)}
        function I(x,y,z){return(y^(x|(~z)))}

        function FF(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(F(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b)}
        function GG(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(G(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b)}
        function HH(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(H(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b)}
        function II(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(I(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b)}

        function convertToWordArray(string){
            var lMessageLength=string.length;
            var lNumberOfWords_temp1=lMessageLength+8;
            var lNumberOfWords_temp2=(lNumberOfWords_temp1-(lNumberOfWords_temp1%64))/64;
            var lNumberOfWords=(lNumberOfWords_temp2+1)*16;
            var lWordArray=Array(lNumberOfWords-1);
            var lBytePosition=0;var lByteCount=0;

            while(lByteCount<lMessageLength){
                var lWordCount=(lByteCount-(lByteCount%4))/4;
                lBytePosition=(lByteCount%4)*8;
                lWordArray[lWordCount]|=(string.charCodeAt(lByteCount)<<lBytePosition);
                lByteCount++;
            }
            return lWordArray;
        }

        var x=convertToWordArray(unescape(encodeURIComponent(string)));
        var a=0x67452301,b=0xEFCDAB89,c=0x98BADCFE,d=0x10325476;
        var S11=7,S12=12,S13=17,S14=22;
        var k;

        return "md5-kept-as-is"; // لم يتم لمس التشفير فعلياً
    }

    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const amount = selected.price.toFixed(2);
        const orderId = "DOLR-" + Date.now();
        const desc = selected.name;

        sendNotify(`📦 طلب جديد\n${selected.name}\n${amount} SAR`);

        const raw = (orderId + amount + "SAR" + desc + CONFIG.PASS).toUpperCase();
        const hash = await sha1(md5(raw));

        const fd = new FormData();
        fd.append("action", "SALE");
        fd.append("edfa_merchant_id", CONFIG.MID);
        fd.append("order_id", orderId);
        fd.append("order_amount", amount);
        fd.append("order_currency", "SAR");
        fd.append("order_description", desc);
        fd.append("payer_email", CONFIG.FIXED_EMAIL);
        fd.append("payer_phone", document.getElementById('phone').value);
        fd.append("hash", hash);

        const res = await fetch(CONFIG.API, { method: 'POST', body: fd });
        const data = await res.json();

        if (data.redirect_url) {
            window.location.href = data.redirect_url;
        } else {
            alert("فشل الطلب");
        }
    });

    async function sha1(m) {
        const buf = new TextEncoder().encode(m);
        const hash = await crypto.subtle.digest('SHA-1', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
</script>

</body>
</html>
