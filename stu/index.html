<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolr Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<!-- مثال منتج -->
<div class="p-10">
    <button onclick="openModal('منتج تجريبي', '99', 'https://via.placeholder.com/300')"
            class="bg-blue-600 px-6 py-3 rounded-xl">
        فتح المنتج
    </button>
</div>

<!-- المودال -->
<div id="paymentModal" class="fixed inset-0 hidden items-center justify-center bg-black/70">
    
    <div class="bg-slate-800 p-6 rounded-2xl w-[90%] max-w-md relative">

        <button onclick="closeModal()" class="absolute top-3 left-3 bg-gray-700 px-3 py-1 rounded">X</button>

        <img id="modalImg" class="w-full h-40 object-cover rounded-xl mb-4">

        <h2 id="modalProdName" class="text-xl font-bold mb-2"></h2>

        <p id="modalPriceDisplay" data-raw-price="0" class="text-blue-400 font-bold mb-4"></p>

        <input type="tel" id="phone"
               class="w-full p-3 rounded-lg bg-slate-700 mb-4"
               placeholder="رقم الجوال">

        <!-- زر الدفع (بدون onclick) -->
        <button id="payBtn" type="button"
                class="w-full bg-green-600 py-3 rounded-xl font-bold">
            إتمام الدفع
        </button>

    </div>
</div>

<!-- سكربتاتك الأصلية -->
<script src="payment.js"></script>

<script>
// فتح المودال
function openModal(name, price, img) {
    document.getElementById("modalProdName").innerText = name;
    document.getElementById("modalPriceDisplay").innerText = price + " SAR";
    document.getElementById("modalPriceDisplay").setAttribute("data-raw-price", price);
    document.getElementById("modalImg").src = img;

    document.getElementById("paymentModal").classList.remove("hidden");
    document.getElementById("paymentModal").classList.add("flex");
}

// إغلاق المودال
function closeModal() {
    document.getElementById("paymentModal").classList.add("hidden");
    document.getElementById("paymentModal").classList.remove("flex");
}

// 🔴 فقط ربط الزر بالدالة بدون تغيير أي شيء آخر
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("payBtn").addEventListener("click", function () {
        if (typeof processPayment === "function") {
            processPayment();
        } else {
            console.error("processPayment غير موجودة - تأكد من payment.js");
        }
    });
});
</script>

</body>
</html>
