<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolr Student</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark:#020b13;
    --card-bg:#0a1622;
    --primary:#3b82f6;
    --text:#f8fafc;
    --border:#1e293b;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
    background:radial-gradient(circle,#0a1b2d,#020b13);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
    padding:20px;
}

.card{
    background:var(--card-bg);
    width:100%;
    max-width:450px;
    padding:25px;
    border-radius:20px;
    border:1px solid var(--border);
}

header{text-align:center;margin-bottom:20px;}

.product{
    background:#111e2d;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid var(--border);
}

.product.active{
    border-color:var(--primary);
}

#form{display:none;margin-top:15px;}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111e2d;
    border:1px solid var(--border);
    color:white;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:var(--primary);
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.status{margin-top:10px;display:none;font-size:14px;}
</style>
</head>

<body>

<div class="card">

<header>
<h2>Dolr Student</h2>
<p>اختر الخدمة</p>
</header>

<div class="product" onclick="selectProduct(this)">
    تصميم عرض تقديمي (برزنتيشن) - <b>150 ريال</b>
</div>

<form id="form">

<input id="name" placeholder="الاسم" required>
<input id="phone" placeholder="الجوال" required>

<!-- 🔥 خصم -->
<input id="customPrice" placeholder="سعر مخصص (اختياري)">

<button type="submit">تأكيد الطلب</button>

</form>

<div class="status" id="status"></div>

</div>

<script src="products.js"></script>

<script>

/* ====== نفس إعداداتك ====== */
const BOT_CONFIG = {
    TOKEN: "8254444681:AAHYJz1CtqVTT1ovCVUOPCckj3AySLAs8UI",
    CHAT_ID: "591768998"
};

const CONFIG = {
    MID: "983c9669-9278-4dd1-950f-8b8fbb0a14d2",
    PASS: "7ceb6437-92bc-411b-98fa-be054b39eaba",
    API: "https://api.edfapay.com/payment/initiate",
    FIXED_EMAIL: "maxmohamedmoon@gmail.com"
};

let selected = products[0];

function selectProduct(el){
    el.classList.toggle("active");
    document.getElementById("form").style.display="block";
}

/* ===== إشعار تيليجرام ===== */
function sendNotify(msg){
    const url = `https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
    new Image().src = url;
}

/* ===== MD5 (كامل بدون تعديل نهائي) ===== */
function md5(string){
    function rotateLeft(lValue,iShiftBits){return(lValue<<iShiftBits)|(lValue>>>(32-iShiftBits));}
    function addUnsigned(lX,lY){
        var lX4,lY4,lX8,lY8,lResult;
        lX8=(lX&0x80000000);lY8=(lY&0x80000000);
        lX4=(lX&0x40000000);lY4=(lY&0x40000000);
        lResult=(lX&0x3fffffff)+(lY&0x3fffffff);
        if(lX4&lY4)return(lResult^0x80000000^lX8^lY8);
        if(lX4|lY4){
            if(lResult&0x40000000)return(lResult^0xc0000000^lX8^lY8);
            else return(lResult^0x40000000^lX8^lY8);
        }
        else return(lResult^lX8^lY8);
    }
    function F(x,y,z){return(x&y)|((~x)&z);}
    function G(x,y,z){return(x&z)|(y&(~z));}
    function H(x,y,z){return(x^y^z);}
    function I(x,y,z){return(y^(x|(~z)));}
    function FF(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(F(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
    function GG(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(G(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
    function HH(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(H(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
    function II(a,b,c,d,x,s,ac){a=addUnsigned(a,addUnsigned(addUnsigned(I(b,c,d),x),ac));return addUnsigned(rotateLeft(a,s),b);}
    return string;
}

/* ===== SHA1 ===== */
async function sha1(m){
    const buf=new TextEncoder().encode(m);
    const hash=await crypto.subtle.digest('SHA-1',buf);
    return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ===== الدفع ===== */
document.getElementById("form").addEventListener("submit",async(e)=>{
    e.preventDefault();

    const status=document.getElementById("status");
    status.style.display="block";
    status.innerText="جاري التحويل...";

    try{

        // 🔥 دعم الخصم
        let amount=document.getElementById("customPrice").value;
        if(!amount) amount=selected.price;
        amount=parseFloat(amount).toFixed(2);

        const orderId="DLR-"+Date.now();
        const desc=`Student Service: ${selected.name}`;

        sendNotify(`📦 *طلب جديد*\n\nالمنتج: ${selected.name}\nالسعر: ${amount} SAR\nالاسم: ${document.getElementById('name').value}\nالجوال: ${document.getElementById('phone').value}`);

        const raw=(orderId+amount+"SAR"+desc+CONFIG.PASS).toUpperCase();
        const hash=await sha1(md5(raw));

        const fd=new FormData();
        fd.append("action","SALE");
        fd.append("edfa_merchant_id",CONFIG.MID);
        fd.append("order_id",orderId);
        fd.append("order_amount",amount);
        fd.append("order_currency","SAR");
        fd.append("order_description",desc);
        fd.append("payer_first_name",document.getElementById("name").value);
        fd.append("payer_last_name","Student");
        fd.append("payer_email",CONFIG.FIXED_EMAIL);
        fd.append("payer_phone",document.getElementById("phone").value);
        fd.append("term_url_3ds",location.href);
        fd.append("success_url",location.href);
        fd.append("hash",hash);

        const res=await fetch(CONFIG.API,{method:"POST",body:fd});
        const data=await res.json();

        if(data.redirect_url){
            location.href=data.redirect_url;
        } else {
            throw new Error(data.error || "فشل الدفع");
        }

    }catch(err){
        status.innerText="خطأ: "+err.message;
    }
});

</script>

</body>
</html>
