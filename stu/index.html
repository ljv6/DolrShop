<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التوريد | Dolr Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- 🔥 CryptoJS (حل المشكلة) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>
body{
    font-family:'Cairo',sans-serif;
    background:#020b13;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:20px;
}
.card{
    width:100%;
    max-width:450px;
    background:#0a1622;
    padding:20px;
    border-radius:15px;
}
.product{
    padding:10px;
    margin:5px 0;
    background:#111e2d;
    cursor:pointer;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}
.product.active{border:1px solid #3b82f6}
input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}
button{background:#3b82f6;color:#fff;font-weight:bold}
.status{margin-top:10px;display:none}
.error{color:red}
</style>
</head>

<body>

<div class="card">

<h3 style="text-align:center">بوابة التوريد</h3>

<div id="list"></div>

<form id="form">
<input type="text" id="name" placeholder="الاسم" required>
<input type="tel" id="phone" placeholder="الجوال" required>

<!-- 🔥 سعر متفق عليه -->
<input type="number" id="customPrice" placeholder="سعر مخفض (اختياري)">

<button type="submit">إرسال الطلب</button>
</form>

<div id="status" class="status"></div>

</div>

<script src="products.js"></script>

<script>
const BOT_CONFIG = {
    TOKEN: "8254444681:AAHYJz1CtqVTT1ovCVUOPCckj3AySLAs8UI",
    CHAT_ID: "591768998"
};

const CONFIG = {
    MID: "983c9669-9278-4dd1-950f-8b8fbb0a14d2",
    PASS: "7ceb6437-92bc-411b-98fa-be054b39eaba",
    API: "https://api.edfapay.com/payment/initiate",
    FIXED_EMAIL: "maxmohamedmoon@gmail.com"
};

let selected = { name:"", price:0 };

// عرض المنتجات
const list = document.getElementById("list");
products.forEach(p=>{
    const div = document.createElement("div");
    div.className="product";
    div.innerHTML=`<span>${p.name}</span><span>${p.price} SAR</span>`;
    div.onclick=()=>{
        document.querySelectorAll(".product").forEach(x=>x.classList.remove("active"));
        div.classList.add("active");
        selected = p;
    };
    list.appendChild(div);
});

// تيليقرام
function sendNotify(msg){
    const url = `https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}`;
    new Image().src = url;
}

// MD5
function md5(str){
    return CryptoJS.MD5(str).toString();
}

// حماية JSON
async function safeJson(res){
    try{return await res.json();}
    catch{return {};}
}

document.getElementById("form").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const status = document.getElementById("status");
    status.style.display="block";
    status.innerHTML="جاري الدفع...";

    try {

        // 🔥 دعم الخصم
        const price = document.getElementById("customPrice").value || selected.price;
        const amount = parseFloat(price).toFixed(2);

        const orderId = "TWRD-" + Date.now();
        const desc = "Tawreed: " + selected.name;

        sendNotify(`طلب جديد\n${selected.name}\n${amount} SAR`);

        const raw = (orderId + amount + "SAR" + desc + CONFIG.PASS).toUpperCase();
        const hash = md5(raw);

        const fd = new FormData();
        fd.append("action","SALE");
        fd.append("edfa_merchant_id",CONFIG.MID);
        fd.append("order_id",orderId);
        fd.append("order_amount",amount);
        fd.append("order_currency","SAR");
        fd.append("order_description",desc);
        fd.append("payer_first_name",document.getElementById("name").value);
        fd.append("payer_phone",document.getElementById("phone").value);
        fd.append("payer_email",CONFIG.FIXED_EMAIL);
        fd.append("term_url_3ds",window.location.href);
        fd.append("success_url",window.location.href);
        fd.append("hash",hash);

        const res = await fetch(CONFIG.API,{method:"POST",body:fd});
        const data = await safeJson(res);

        if(data.redirect_url){
            status.innerHTML="جاري التحويل...";
            setTimeout(()=>window.location.href=data.redirect_url,700);
        } else {
            throw new Error("لا يوجد رابط تحويل من البوابة");
        }

    } catch(err){
        status.innerHTML="فشل: "+err.message;
        status.className="error";
    }
});
</script>

</body>
</html>
