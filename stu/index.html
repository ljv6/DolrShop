<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات الطالب | Dolr</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .product-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: scale(1.03);
        }

        #paymentModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        #paymentModal.active {
            display: flex;
        }

        .modal-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #2563eb;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- العنوان -->
<div class="text-center py-6 text-2xl font-bold">
    خدمات الطالب
</div>

<!-- المنتجات -->
<div id="products-list" class="grid grid-cols-2 md:grid-cols-3 gap-4 px-4"></div>

<!-- المودال -->
<div id="paymentModal">
    <div class="modal-box">
        <h2 id="modalProdName" class="text-xl font-bold mb-2"></h2>

        <img id="modalImg" class="w-full rounded-lg mb-3">

        <p id="modalPriceDisplay" class="text-blue-400 font-bold mb-3"></p>

        <input type="tel" id="phone" placeholder="رقم الجوال">

        <button id="payBtn" onclick="processPayment()">إتمام الشراء</button>

        <button onclick="closeModal()" style="background:#ef4444;margin-top:10px;">إغلاق</button>
    </div>
</div>

<!-- المنتجات -->
<script src="products.js"></script>

<!-- الدفع فقط -->
<script src="payment.js"></script>

<script>
function renderProducts() {
    const container = document.getElementById('products-list');

    container.innerHTML = products.map(p => `
        <div class="product-card" onclick="openModal('${p.name}','${p.price}','${p.img}')">
            <img src="${p.img}" class="w-full h-40 object-cover">
            <div class="p-3">
                <h3 class="text-sm font-bold">${p.name}</h3>
                <p class="text-blue-400 font-bold">${p.price} SAR</p>
            </div>
        </div>
    `).join('');
}

function openModal(name, price, img) {
    document.getElementById('modalProdName').innerText = name;
    document.getElementById('modalPriceDisplay').innerText = price + " SAR";
    document.getElementById('modalImg').src = img;

    document.getElementById('paymentModal').classList.add('active');
}

function closeModal() {
    document.getElementById('paymentModal').classList.remove('active');
}

document.addEventListener('DOMContentLoaded', renderProducts);
</script>

</body>
</html>
