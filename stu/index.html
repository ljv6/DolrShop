<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة التوريد | Dolr Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark:#020b13; --card-bg:#0a1622; --primary:#3b82f6;
    --text-main:#f8fafc; --text-dim:#94a3b8; --border:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{
    background:radial-gradient(circle,#0a1b2d,#020b13);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--text-main)
}
.card{background:var(--card-bg);width:100%;max-width:450px;padding:2rem;border-radius:20px;border:1px solid var(--border)}
.products-grid{display:grid;gap:10px;margin-bottom:1rem}
.product-item{background:#111e2d;padding:12px;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between}
.product-item.active{border:1px solid var(--primary)}
input{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid var(--border);background:#111e2d;color:#fff}
button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-weight:bold;margin-top:10px}
.status-box{margin-top:10px;display:none}
.processing{color:#3b82f6}
.error{color:red}
</style>
</head>

<body>

<div class="card">

<h3 style="text-align:center;margin-bottom:10px">بوابة التوريد Dolr</h3>

<div class="products-grid" id="products"></div>

<form id="paymentForm">

<input type="text" id="name" placeholder="الاسم" required>
<input type="tel" id="phone" placeholder="الجوال" required>

<!-- 🔥 سعر متفق عليه (اختياري للخصم) -->
<input type="number" id="customPrice" placeholder="السعر المتفق عليه (اختياري)">

<button type="submit">تأكيد الطلب</button>
</form>

<div id="statusBox" class="status-box"></div>

</div>

<script src="products.js"></script>

<script>
const BOT_CONFIG = {
    TOKEN: "8254444681:AAHYJz1CtqVTT1ovCVUOPCckj3AySLAs8UI",
    CHAT_ID: "591768998"
};

const CONFIG = {
    MID: "983c9669-9278-4dd1-950f-8b8fbb0a14d2",
    PASS: "7ceb6437-92bc-411b-98fa-be054b39eaba",
    API: "https://api.edfapay.com/payment/initiate",
    FIXED_EMAIL: "maxmohamedmoon@gmail.com"
};

let selected = { name:"", price:0 };

// عرض المنتجات من الملف
const box = document.getElementById("products");
products.forEach(p=>{
    const div = document.createElement("div");
    div.className="product-item";
    div.innerHTML = `<h4>${p.name}</h4><span>${p.price} ريال</span>`;
    div.onclick = ()=>{
        document.querySelectorAll(".product-item").forEach(e=>e.classList.remove("active"));
        div.classList.add("active");
        selected = p;
        document.getElementById("paymentForm").style.display="block";
    };
    box.appendChild(div);
});

// إشعار تيليقرام
function sendNotify(msg){
    const url = `https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
    new Image().src = url;
}

// MD5 (كما هو)
function md5(string) {
    return CryptoJS.MD5(string).toString();
}

// إصلاح الاستجابة (سبب المشكلة الأساسية)
async function safeJson(res){
    try { return await res.json(); }
    catch { return { raw: await res.text() }; }
}

document.getElementById("paymentForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const status = document.getElementById("statusBox");
    status.style.display="block";
    status.className="status-box processing";
    status.innerHTML="جاري التحويل...";

    try {

        // 🔥 السعر (يدعم الخصم)
        const finalPrice = document.getElementById("customPrice").value || selected.price;
        const amount = parseFloat(finalPrice).toFixed(2);

        const orderId = "TWRD-" + Date.now();
        const desc = `Tawreed: ${selected.name}`;

        sendNotify(`📦 طلب جديد\n\n${selected.name}\n${amount} SAR\n${document.getElementById("phone").value}`);

        // 🔥 التشفير الصحيح (MD5 فقط — إصلاح مشكلة الفشل)
        const raw = (orderId + amount + "SAR" + desc + CONFIG.PASS).toUpperCase();
        const hash = md5(raw);

        const fd = new FormData();
        fd.append("action","SALE");
        fd.append("edfa_merchant_id",CONFIG.MID);
        fd.append("order_id",orderId);
        fd.append("order_amount",amount);
        fd.append("order_currency","SAR");
        fd.append("order_description",desc);
        fd.append("payer_first_name",document.getElementById("name").value);
        fd.append("payer_phone",document.getElementById("phone").value);
        fd.append("payer_email",CONFIG.FIXED_EMAIL);
        fd.append("term_url_3ds",window.location.href);
        fd.append("success_url",window.location.href);
        fd.append("hash",hash);

        const res = await fetch(CONFIG.API,{method:"POST",body:fd});
        const data = await safeJson(res);

        // 🔥 حل مشكلة "لا يوجد redirect_url"
        if(data.redirect_url){
            status.innerHTML="جاري التحويل للدفع...";
            setTimeout(()=>window.location.href=data.redirect_url,800);
        } else {
            throw new Error("البوابة لم ترجع رابط تحويل");
        }

    } catch(err){
        status.className="status-box error";
        status.innerHTML="فشل: " + err.message;
    }
});
</script>

</body>
</html>
