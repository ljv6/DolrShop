const quizDiv = document.getElementById("quiz");

questions.forEach((item, index) => {
    let div = document.createElement("div");
    div.classList.add("question");

    div.innerHTML = `
    <p><b>Q${index+1}: ${item.q}</b></p>
    <p class="ar">${item.ar}</p>
    ${item.options.map((opt,i)=>`
    <label>
    <input type="radio" name="q${index}" onclick="checkAnswer(${index},${i},this)">
    ${opt[0]} <span class="ar">(${opt[1]})</span>
    </label><br>`).join("")}
    <p id="result${index}"></p>
    `;

    quizDiv.appendChild(div);
});

function checkAnswer(qIndex, selected, el) {
    let result = document.getElementById("result"+qIndex);

    if(el.disabled) return;

    let correct = questions[qIndex].correct;

    document.getElementsByName("q"+qIndex).forEach(r=>r.disabled=true);

    if(selected === correct){
        score++;
        result.innerHTML = "<span class='correct'>✔ Correct</span>";
    } else {
        result.innerHTML = "<span class='wrong'>✘ Wrong</span>";
    }

    document.getElementById("score").innerText = "Score: " + score + " / 30";
}

function toggleArabic(){
    document.querySelectorAll(".ar").forEach(el=>{
        el.style.display = el.style.display === "none" ? "inline" : "none";
    });
}
</script>

</body>
</html>
