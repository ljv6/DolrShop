<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lers</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg, #7f1d1d, #450a0a);
    color: #fff;
}

.glass {
    background: rgba(153, 27, 27, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
}

.glow {
    box-shadow: 0 0 10px rgba(255,0,0,0.4),
                0 0 20px rgba(255,0,0,0.3);
}

button {
    background: linear-gradient(135deg, #dc2626, #991b1b);
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,0,0,0.6);
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body class="p-6">

<div class="glass glow p-6 max-w-md mx-auto">

    <h2 class="text-xl font-bold text-center mb-4">Lers Payment</h2>

    <input id="phone" placeholder="رقم الجوال" class="mb-3">

    <div id="modalProdName" class="mb-1">منتج تجريبي</div>
    <div id="modalPriceDisplay" data-raw-price="50" class="mb-4">50 SAR</div>

    <button id="payBtn" onclick="processPayment()" class="w-full glow">
        الدفع الآن
    </button>

</div>

<script>
const BOT_CONFIG = {
    TOKEN: "PUT_YOUR_TOKEN",
    CHAT_ID: "PUT_CHAT_ID"
};

const CONFIG = {
    MERCHANT_ID: "PUT_MERCHANT_ID",
    MERCHANT_PASSWORD: "PUT_PASSWORD",
    API_URL: "https://api.edfapay.com/payment/initiate",
    FIXED_EMAIL: "PUT_EMAIL"
};

async function processPayment() {

    const btn = document.getElementById('payBtn');
    const phone = document.getElementById('phone').value.trim();
    const prodName = document.getElementById('modalProdName').innerText;
    const priceElement = document.getElementById('modalPriceDisplay');

    let amountVal = priceElement.getAttribute('data-raw-price');

    if (!phone || phone.length < 9) {
        alert("رقم الجوال غير صحيح");
        return;
    }

    btn.disabled = true;
    btn.innerText = "جاري التحويل...";

    // تليجرام
    const msg = `🛒 طلب جديد\n📦 ${prodName}\n💰 ${amountVal} SAR\n📱 ${phone}`;

    fetch(`https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}`);

    try {
        const orderId = "LERS-" + Date.now();

        const formData = new FormData();
        formData.append("action", "SALE");
        formData.append("edfa_merchant_id", CONFIG.MERCHANT_ID);
        formData.append("order_id", orderId);
        formData.append("order_amount", amountVal);
        formData.append("order_currency", "SAR");
        formData.append("payer_phone", phone);
        formData.append("payer_email", CONFIG.FIXED_EMAIL);

        const res = await fetch(CONFIG.API_URL, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.redirect_url) {
            window.location.href = data.redirect_url;
        } else {
            alert("خطأ في الدفع");
        }

    } catch (e) {
        alert("حدث خطأ");
    }

    btn.disabled = false;
    btn.innerText = "الدفع الآن";
}
</script>

</body>
</html>
