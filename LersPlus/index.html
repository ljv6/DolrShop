<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lers | المتجر المطوّر</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
.no-scrollbar::-webkit-scrollbar { display: none; }

#loader { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; background: #0f172a; }
.animate-bar { animation: loading-bar 1.5s infinite; height: 2px; background: #2563eb; margin-top: 20px; }

@keyframes loading-bar { 0% { width: 0; } 50% { width: 120px; } 100% { width: 0; } }

.product-card { background-color: #1e293b; border: 1px solid #334155; }

#paymentModal { display: none; }
#paymentModal.active { display: flex; }
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
    <div>
        <img src="IMG_7454-removebg-preview.png" class="w-32 mx-auto">
        <div class="animate-bar"></div>
    </div>
</div>

<!-- Navbar -->
<nav class="flex justify-between px-6 py-5 bg-[#1e293b]">
    <h1 class="font-black text-lg">Lers</h1>
    <div>🛒</div>
</nav>

<!-- Categories -->
<section class="p-6">
    <div id="categories-list" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
</section>

<!-- Products -->
<section class="p-6">
    <div id="products-list" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
</section>

<!-- Footer -->
<footer class="p-6 text-center">
    <div id="social-container"></div>
    <p class="text-xs text-gray-500 mt-4">© 2026 Lers</p>
</footer>

<!-- Modal -->
<div id="paymentModal" class="fixed inset-0 bg-black/80 items-center justify-center">
    <div class="bg-gray-900 p-6 rounded-xl w-full max-w-md">
        <h2 id="modalProdName" class="font-bold mb-2"></h2>
        <p id="modalPriceDisplay" class="text-blue-400 mb-3"></p>

        <input id="phone" placeholder="رقم الجوال" class="w-full p-3 bg-gray-800 rounded mb-3">

        <button onclick="processPayment()" id="payBtn" class="w-full bg-blue-600 py-3 rounded">
            إتمام الشراء
        </button>

        <button onclick="closeModal()" class="mt-3 text-red-400 w-full">
            إغلاق
        </button>
    </div>
</div>

<script>

// بيانات
const categories = [
{ name: "سناب شات" },
{ name: "ذكاء اصطناعي" },
{ name: "بيانات" }
];

const products = [
{ name:"شريحة بيانات STC", price:"80", img:"IMG_7421.png"},
{ name:"سناب 3 أشهر", price:"25", img:"IMG_7416.png"},
{ name:"ChatGPT سنة", price:"35", img:"IMG_7422.png"}
];

// عرض الأقسام
function renderCategories() {
    const el = document.getElementById('categories-list');
    el.innerHTML = categories.map(c => `
        <div class="bg-gray-800 px-4 py-2 rounded cursor-pointer text-sm">${c.name}</div>
    `).join('');
}

// عرض المنتجات
function renderProducts(){
    const el = document.getElementById('products-list');
    el.innerHTML = products.map(p=>`
        <div class="product-card rounded-xl overflow-hidden cursor-pointer"
            onclick="openModal('${p.name}','${p.price}','${p.img}')">
            <img src="${p.img}" class="w-full aspect-square object-cover">
            <div class="p-3">
                <p class="text-xs">${p.name}</p>
                <p class="text-blue-400 font-bold">${p.price} SAR</p>
            </div>
        </div>
    `).join('');
}

// مودال
function openModal(name,price,img){
    document.getElementById('modalProdName').innerText = name;
    document.getElementById('modalPriceDisplay').innerText = price + " SAR";
    document.getElementById('paymentModal').classList.add("active");
    document.body.style.overflow = 'hidden';
}

function closeModal(){
    document.getElementById('paymentModal').classList.remove("active");
    document.body.style.overflow = 'auto';
}

// تليجرام
const BOT_CONFIG = { 
    TOKEN:"YOUR_TOKEN", 
    CHAT_ID:"YOUR_ID"
};

function processPayment(){
    const phone = document.getElementById('phone').value;
    const product = document.getElementById('modalProdName').innerText;
    const price = document.getElementById('modalPriceDisplay').innerText;

    if(!phone){
        alert("اكتب رقمك");
        return;
    }

    const msg = `🛒 طلب جديد من Lers
📦 ${product}
💰 ${price}
📱 ${phone}`;

    fetch(`https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}`);

    alert("تم إرسال الطلب ✅");
}

// تشغيل
window.addEventListener('load', () => {

    renderCategories();
    renderProducts();

    const loader = document.getElementById('loader');
    setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }, 800);

});

</script>

</body>
</html>
