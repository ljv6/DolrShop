<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lers | المتجر المطوّر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loader { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease-in-out; background: #0f172a; }
        .loader-logo { width: 140px; height: auto; position: relative; z-index: 10; }
        @keyframes loading-bar { 0% { width: 0; } 50% { width: 120px; } 100% { width: 0; } }
        .animate-bar { animation: loading-bar 1.5s infinite ease-in-out; height: 2px; background-color: #2563eb; margin-top: 20px; }
        nav { background-color: #1e293b; border-bottom: 1px solid #334155; }
        .product-card { background-color: #1e293b; border: 1px solid #334155; }
        .bg-gray-50 { background-color: #111827 !important; }
        #banner-slider { display: flex; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .banner-slide { min-width: 100%; position: relative; height: 40vh; background-color: #000; }
        .dot-item { transition: all 0.4s ease; width: 8px; height: 6px; border-radius: 10px; background-color: rgba(255,255,255,0.3); }
        .dot-item.active { width: 24px; background-color: white !important; }
        #paymentModal { display: none; opacity: 0; transition: opacity 0.3s ease; }
        #paymentModal.active { display: flex; opacity: 1; }
        .modal-content { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="antialiased">

<div id="loader">
    <img src="IMG_7454-removebg-preview.png" class="loader-logo">
    <div class="animate-bar"></div>
</div>

<nav class="flex items-center justify-between px-6 py-5">
    <img src="IMG_7454-removebg-preview.png" class="h-10 cursor-pointer" onclick="location.reload()">
    <div>🛒</div>
</nav>

<section>
    <div id="banner-slider"></div>
</section>

<section class="p-6">
    <div id="categories-list" class="flex gap-4 overflow-x-auto"></div>
</section>

<section class="p-6">
    <div id="products-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</section>

<footer class="p-6 text-center">
    <div id="social-container"></div>
    <p class="text-xs text-gray-500">© 2026 Lers</p>
</footer>

<div id="paymentModal" class="fixed inset-0 bg-black/80 items-center justify-center">
    <div class="modal-content p-6 rounded-xl w-full max-w-md">
        <h2 id="modalProdName"></h2>
        <p id="modalPriceDisplay"></p>
        <input id="phone" class="w-full p-3 mt-3 bg-gray-800 rounded" placeholder="رقم الجوال">
        <button onclick="processPayment()" id="payBtn" class="w-full mt-3 bg-blue-600 p-3 rounded">إتمام الشراء</button>
        <button onclick="closeModal()" class="mt-2 text-red-400">إغلاق</button>
    </div>
</div>

<script>

// categories
const categories = [
{ name: "سناب شات"},
{ name: "ذكاء اصطناعي"},
{ name: "بيانات"}
];

// products
const products = [
{ name:"شريحة بيانات STC", price:"80", img:"IMG_7421.png"},
{ name:"اشتراك سناب 3 أشهر", price:"25", img:"IMG_7416.png"},
{ name:"اشتراك شات جي بي تي", price:"35", img:"IMG_7422.png"}
];

// render
function renderProducts(){
productsList.innerHTML = products.map(p=>`
<div class="product-card p-2 rounded" onclick="openModal('${p.name}','${p.price}','${p.img}')">
<img src="${p.img}">
<p>${p.name}</p>
<p>${p.price} SAR</p>
</div>`).join('');
}

// modal
function openModal(name,price,img){
modalProdName.innerText=name;
modalPriceDisplay.innerText=price+" SAR";
paymentModal.classList.add("active");
}

function closeModal(){
paymentModal.classList.remove("active");
}

// telegram
const BOT_CONFIG = { 
TOKEN:"8254444681:AAHY...", 
CHAT_ID:"591768998"
};

function processPayment(){
const phone=document.getElementById('phone').value;
const product=document.getElementById('modalProdName').innerText;
const price=document.getElementById('modalPriceDisplay').innerText;

const msg = `🛒 طلب جديد من Lers
📦 ${product}
💰 ${price}
📱 ${phone}`;

fetch(`https://api.telegram.org/bot${BOT_CONFIG.TOKEN}/sendMessage?chat_id=${BOT_CONFIG.CHAT_ID}&text=${encodeURIComponent(msg)}`);

alert("تم الإرسال");
}

// start
window.onload=()=>{
renderProducts();
setTimeout(()=>loader.style.display="none",1000);
}

</script>

</body>
</html>
